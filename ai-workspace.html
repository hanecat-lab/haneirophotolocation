<script>
'use strict';
const {useState,useEffect,useCallback,useRef} = React;
const h = React.createElement;

/* =====================================================================
   AI Workspace（Web版）
   - あらゆる情報を再利用可能な資産(WorkspaceItem)として扱うナレッジワークスペース
   - 出力プロファイル駆動：コピーは必ずOutputProfileのテンプレートを通す
   - ナレッジグラフ：sourceItemId で発生源→成果物の依存関係を追跡
   - 全データはIndexedDBにローカル保存（サーバーレス・APIキー不要）
   - OCRはTesseract.js（CDN・端末内処理・要ネット接続※初回モデル取得）
   ===================================================================== */

/* ===== 定数 ===== */
const ROLES = {
  input:      {label:'入力',        icon:'📥'},
  aiResponse: {label:'AI回答',      icon:'🤖'},
  finalized:  {label:'確定版',      icon:'✅'},
  template:   {label:'テンプレート', icon:'📋'},
};
const LOG_ACTIONS = {
  create:      {label:'作成',     icon:'＋'},
  edit:        {label:'編集',     icon:'✏️'},
  ocr:         {label:'OCR',      icon:'🔍'},
  copy:        {label:'コピー',   icon:'📄'},
  aiInference: {label:'AI実行',   icon:'🤖'},
  workflowRun: {label:'ワークフロー実行', icon:'▶️'},
};
const DEFAULT_PROFILES = [
  {profileId:'plain_text',    name:'プレーンテキスト',        formatType:'text',
   templateText:'{{content}}'},
  {profileId:'markdown_spec', name:'Markdown（見出し付き）',  formatType:'markdown',
   templateText:'## {{title}}\n\n{{content}}\n'},
  {profileId:'json_summary',  name:'JSONサマリー',            formatType:'json',
   templateText:'{\n  "title": "{{title}}",\n  "content": "{{content}}"\n}'},
];
/* 外部AI（ChatGPT/Claude等）に貼り付ける用のプロンプト。ユーザーが追加登録できる。
   本文を先に読める（プロンプトコピー結果を単独で使いやすい）よう{{content}}を先頭に置く。 */
const DEFAULT_PROMPTS = [
  {promptId:'dedupe_cleanup', name:'重複削除・整形', category:'整形',
   promptText:'{{content}}\n\n----\n上記は書類や画面を連続撮影した複数画像のOCRテキストです。\n次のルールで整えて、本文だけを出力してください。\n- 画像間で重複している部分は1回だけ残して削除する\n- OCRの誤認識と思われる箇所は文脈から自然に修正する\n- 内容の追加・省略・要約はしない'},
  {promptId:'summary_bullets', name:'要約（箇条書き）', category:'要約',
   promptText:'{{content}}\n\n----\n上記の文章を、重要な点を漏らさず日本語の箇条書きで要約してください。'},
];
/* カテゴリ未設定のプロンプトはUI上この名前で扱う */
const UNCATEGORIZED='未分類';
/* 旧テンプレート（本文が末尾）。既存ユーザーのデータを新テンプレートへ移行する際の比較用。
   ユーザーが自分で編集済みの場合（旧文言と不一致）は上書きしない。 */
const OLD_DEFAULT_PROMPTS_TEXT = {
  dedupe_cleanup:'以下は書類や画面を連続撮影した複数画像のOCRテキストです。\n次のルールで整えて、本文だけを出力してください。\n- 画像間で重複している部分は1回だけ残して削除する\n- OCRの誤認識と思われる箇所は文脈から自然に修正する\n- 内容の追加・省略・要約はしない\n\n----\n{{content}}',
  summary_bullets:'以下の文章を、重要な点を漏らさず日本語の箇条書きで要約してください。\n\n----\n{{content}}',
};

/* ===== IndexedDB ===== */
const DB_NAME='ai-workspace-v1', DB_VER=2;
let _db=null;
function openDb(){
  if(_db) return Promise.resolve(_db);
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(e.oldVersion<1){
        const items=db.createObjectStore('items',{keyPath:'id',autoIncrement:true});
        items.createIndex('sourceItemId','sourceItemId');
        const logs=db.createObjectStore('logs',{keyPath:'id',autoIncrement:true});
        logs.createIndex('itemId','itemId');
        db.createObjectStore('profiles',{keyPath:'profileId'});
        db.createObjectStore('files'); /* key=fileKey, value=Blob */
      }
      if(e.oldVersion<2){
        db.createObjectStore('prompts',{keyPath:'promptId'});
      }
    };
    req.onsuccess=()=>{_db=req.result;resolve(_db);};
    req.onerror=()=>reject(req.error);
  });
}
function tx(store,mode,fn){
  return openDb().then(db=>new Promise((resolve,reject)=>{
    const t=db.transaction(store,mode);
    const result=fn(t.objectStore(store));
    t.oncomplete=()=>resolve(result && result.result!==undefined ? result.result : result);
    t.onerror=()=>reject(t.error);
  }));
}
function reqAsPromise(store,mode,fn){
  return openDb().then(db=>new Promise((resolve,reject)=>{
    const t=db.transaction(store,mode);
    const req=fn(t.objectStore(store));
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  }));
}

/* ===== リポジトリ ===== */
const repo={
  async fetchAllItems(){
    const items=await reqAsPromise('items','readonly',s=>s.getAll());
    return items.sort((a,b)=>b.createdAt-a.createdAt);
  },
  async fetchItem(id){ return reqAsPromise('items','readonly',s=>s.get(id)); },
  async saveItem(item){
    item.updatedAt=Date.now();
    const id=await reqAsPromise('items','readwrite',s=>s.put(item));
    item.id=id;
    return id;
  },
  async deleteItem(id){
    const logs=await reqAsPromise('logs','readonly',s=>s.index('itemId').getAll(id));
    await reqAsPromise('logs','readwrite',s=>{
      logs.forEach(l=>s.delete(l.id));
      return s.count(); /* ダミーの最終リクエスト */
    });
    return reqAsPromise('items','readwrite',s=>s.delete(id));
  },
  async fetchDerived(id){
    return reqAsPromise('items','readonly',s=>s.index('sourceItemId').getAll(id));
  },
  async saveLog(itemId,action,description){
    return reqAsPromise('logs','readwrite',s=>s.put({
      itemId, action, description, executedAt:Date.now(),
    }));
  },
  async fetchLogs(itemId){
    const logs=await reqAsPromise('logs','readonly',s=>s.index('itemId').getAll(itemId));
    return logs.sort((a,b)=>b.executedAt-a.executedAt);
  },
  async seedProfiles(){
    const count=await reqAsPromise('profiles','readonly',s=>s.count());
    if(count>0) return;
    await reqAsPromise('profiles','readwrite',s=>{
      let last;
      DEFAULT_PROFILES.forEach(p=>{last=s.put({...p,updatedAt:Date.now()});});
      return last;
    });
  },
  async fetchProfiles(){ return reqAsPromise('profiles','readonly',s=>s.getAll()); },
  async seedPrompts(){
    const count=await reqAsPromise('prompts','readonly',s=>s.count());
    if(count===0){
      await reqAsPromise('prompts','readwrite',s=>{
        let last;
        DEFAULT_PROMPTS.forEach(p=>{last=s.put({...p,updatedAt:Date.now()});});
        return last;
      });
      return;
    }
    /* 既存ユーザー向け移行 */
    const existing=await reqAsPromise('prompts','readonly',s=>s.getAll());
    const DEFAULT_CATEGORY={dedupe_cleanup:'整形',summary_bullets:'要約'};
    /* (a) 未編集の旧デフォルトプロンプトは新テンプレートに丸ごと更新する */
    const textMigrate=DEFAULT_PROMPTS.filter(def=>{
      const cur=existing.find(p=>p.promptId===def.promptId);
      return cur && cur.promptText===OLD_DEFAULT_PROMPTS_TEXT[def.promptId];
    });
    /* (b) デフォルトプロンプトにカテゴリが無い場合だけ補完する（本文の編集内容は触らない） */
    const catMigrate=existing.filter(p=>
      DEFAULT_CATEGORY[p.promptId] && p.category===undefined &&
      !textMigrate.some(t=>t.promptId===p.promptId));
    if(textMigrate.length===0 && catMigrate.length===0) return;
    await reqAsPromise('prompts','readwrite',s=>{
      let last;
      textMigrate.forEach(p=>{last=s.put({...p,updatedAt:Date.now()});});
      catMigrate.forEach(p=>{last=s.put({...p,category:DEFAULT_CATEGORY[p.promptId],updatedAt:Date.now()});});
      return last;
    });
  },
  async fetchPrompts(){ return reqAsPromise('prompts','readonly',s=>s.getAll()); },
  async savePrompt(p){
    p.updatedAt=Date.now();
    return reqAsPromise('prompts','readwrite',s=>s.put(p));
  },
  async deletePrompt(promptId){
    return reqAsPromise('prompts','readwrite',s=>s.delete(promptId));
  },
  async toggleFavorite(promptId){
    const p=await reqAsPromise('prompts','readonly',s=>s.get(promptId));
    if(!p) return;
    p.favorite=!p.favorite;
    p.updatedAt=Date.now();
    return reqAsPromise('prompts','readwrite',s=>s.put(p));
  },
  async saveFile(blob,fileName){
    const fileKey=Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,10)
      +'_'+fileName.replace(/[^A-Za-z0-9._-]/g,'_');
    await reqAsPromise('files','readwrite',s=>s.put(blob,fileKey));
    return fileKey;
  },
  async getFile(fileKey){ return reqAsPromise('files','readonly',s=>s.get(fileKey)); },
  async deleteFile(fileKey){ return reqAsPromise('files','readwrite',s=>s.delete(fileKey)); },

  /* ===== バックアップ（JSONエクスポート/インポート） ===== */
  async exportAll(){
    const [items,logs,profiles,prompts]=await Promise.all([
      reqAsPromise('items','readonly',s=>s.getAll()),
      reqAsPromise('logs','readonly',s=>s.getAll()),
      reqAsPromise('profiles','readonly',s=>s.getAll()),
      reqAsPromise('prompts','readonly',s=>s.getAll()),
    ]);
    const fileKeys=new Set();
    items.forEach(it=>{
      if(it.fileKey) fileKeys.add(it.fileKey);
      (it.fileKeys||[]).forEach(k=>fileKeys.add(k));
    });
    const files={};
    for(const key of fileKeys){
      const blob=await repo.getFile(key);
      if(blob) files[key]=await blobToDataUri(blob);
    }
    return {version:1,exportedAt:new Date().toISOString(),items,logs,profiles,prompts,files};
  },
  /* インポートは既存データを保持したまま追加する（上書き・削除はしない）。
     アイテムIDはstore側で新規採番し直し、sourceItemIdの親子関係とログのitemIdは
     新IDにマッピングして貼り替える。添付ファイルも新しいfileKeyで保存し直す。
     profiles/promptsはbusiness key（profileId/promptId）なのでそのままupsertする。 */
  async importAll(data){
    if(!data||!Array.isArray(data.items)) throw new Error('不正なバックアップファイルです');

    const fileKeyMap={};
    for(const [oldKey,dataUri] of Object.entries(data.files||{})){
      const blob=await dataUriToBlob(dataUri);
      fileKeyMap[oldKey]=await repo.saveFile(blob,'restored.jpg');
    }

    const idMap={};
    const pendingSourceLinks=[];
    for(const it of data.items){
      const {id:oldId,sourceItemId:oldSourceItemId,...rest}=it;
      if(rest.fileKey) rest.fileKey=fileKeyMap[rest.fileKey]||null;
      if(rest.fileKeys) rest.fileKeys=rest.fileKeys.map(k=>fileKeyMap[k]).filter(Boolean);
      rest.sourceItemId=null;
      const newId=await reqAsPromise('items','readwrite',s=>s.add(rest));
      idMap[oldId]=newId;
      if(oldSourceItemId!=null) pendingSourceLinks.push({newId,oldSourceItemId});
    }
    for(const {newId,oldSourceItemId} of pendingSourceLinks){
      const mapped=idMap[oldSourceItemId];
      if(mapped==null) continue;
      const item=await reqAsPromise('items','readonly',s=>s.get(newId));
      item.sourceItemId=mapped;
      await reqAsPromise('items','readwrite',s=>s.put(item));
    }

    let logCount=0;
    for(const log of (data.logs||[])){
      const newItemId=idMap[log.itemId];
      if(newItemId==null) continue;
      const {id,...rest}=log;
      rest.itemId=newItemId;
      await reqAsPromise('logs','readwrite',s=>s.add(rest));
      logCount++;
    }

    for(const p of (data.profiles||[])) await reqAsPromise('profiles','readwrite',s=>s.put(p));
    for(const p of (data.prompts||[])) await reqAsPromise('prompts','readwrite',s=>s.put(p));

    return {itemCount:data.items.length,logCount};
  },
};
window._repo=repo; /* テスト用に公開 */

/* ===== 出力プロファイルのテンプレート描画 ===== */
function renderTemplate(template,item){
  return template
    .replaceAll('{{title}}',item.title||'')
    .replaceAll('{{content}}',item.content||'')
    .replaceAll('{{rawContent}}',item.rawContent||'');
}

/* プロンプトコピー用の描画。{{content}}が書かれていればその位置（意図した配置）を尊重するが、
   書き忘れていても本文が抜け落ちないよう自動で追加する（別コピー不要にするため）。
   自動追加時は本文を先頭に、プロンプト指示文を後ろにする
   （コピー結果を単独で読む/使う場合に本文がすぐ見えるようにするため）。 */
function renderPromptCopy(promptText,item){
  const rendered=renderTemplate(promptText,item);
  if(promptText.includes('{{content}}')) return rendered;
  const body=(item.content||'').trim();
  if(!body) return rendered;
  return body+'\n\n----\n'+rendered.replace(/^\s+/,'');
}

/* {{content}}プレースホルダとその前後の「----」区切りを取り除き、指示文だけを返す
   （まとめてコピー時に本文を重複させないため） */
function extractInstructionText(promptText,item){
  const stripped=promptText.replace('{{content}}','').trim()
    .replace(/^----\s*/,'').replace(/\s*----$/,'');
  return renderTemplate(stripped,item).trim();
}

/* 複数プロンプトのまとめてコピー：本文は1回だけ先頭に、各プロンプトの指示文を
   【プロンプト名】ラベル付きで後ろに並べる（同じ本文を複数のAIチャットで使い分けたい場合に、
   コピーをやり直さずに済むようにする） */
function renderCombinedPromptCopy(selectedPrompts,item){
  const body=(item.content||'').trim();
  const blocks=selectedPrompts.map(p=>
    `【${p.name}】\n${extractInstructionText(p.promptText,item)}`);
  if(!body) return blocks.join('\n\n');
  return body+'\n\n----\n'+blocks.join('\n\n');
}

/* ===== 連続画像OCRの重複トリム =====
   前の画像の末尾と次の画像の先頭が重なって写っている場合に、
   空白・改行を無視した文字列一致で重複部分を検出し、次テキストの先頭から削る。
   OCRの誤認識で一致しない場合は削らない（プロンプトでのAI仕上げに委ねる）。 */
function trimOverlap(prev, next){
  const norm=s=>s.replace(/\s+/g,'');
  const nPrev=norm(prev), nNext=norm(next);
  const max=Math.min(nPrev.length, nNext.length, 300);
  let found=0;
  for(let k=max;k>=10;k--){
    if(nPrev.endsWith(nNext.slice(0,k))){ found=k; break; }
  }
  if(!found) return {text:next, trimmed:false};
  /* 正規化でfound文字ぶんに相当するnext原文の位置を求めて切除 */
  let count=0, cut=0;
  while(cut<next.length && count<found){
    if(!/\s/.test(next[cut])) count++;
    cut++;
  }
  return {text:next.slice(cut).replace(/^\s+/,''), trimmed:true};
}
window._trimOverlap=trimOverlap; /* テスト用に公開 */

/* ===== OCR（Tesseract.js を遅延ロード） ===== */
let _tesseractLoading=null;
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  if(_tesseractLoading) return _tesseractLoading;
  _tesseractLoading=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>{_tesseractLoading=null;reject(new Error('OCRライブラリの読み込みに失敗しました（ネット接続を確認してください）'));};
    document.head.appendChild(s);
  });
  return _tesseractLoading;
}
async function runOcr(blob,onProgress){
  await loadTesseract();
  const result=await window.Tesseract.recognize(blob,'jpn+eng',{
    logger:m=>{ if(m.status==='recognizing text') onProgress(m.progress); },
  });
  /* 日本語OCRは文字間に不要な半角スペースが入りやすいので軽く整形 */
  return result.data.text.replace(/([぀-ヿ一-鿿]) (?=[぀-ヿ一-鿿])/g,'$1').trim();
}

/* ===== ユーティリティ ===== */
function fmtDate(ts){
  const d=new Date(ts), p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    const ok=document.execCommand('copy'); ta.remove(); return ok;
  }
}
/* バックアップのJSONに画像を埋め込むためのBlob⇔dataURI変換 */
function blobToDataUri(blob){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>reject(r.error);
    r.readAsDataURL(blob);
  });
}
async function dataUriToBlob(dataUri){
  const res=await fetch(dataUri);
  return res.blob();
}

/* ===== スタイル ===== */
const S={
  page:{maxWidth:640,margin:'0 auto',minHeight:'100vh',display:'flex',flexDirection:'column'},
  header:{position:'sticky',top:0,zIndex:10,background:'rgba(13,17,23,.92)',
    backdropFilter:'blur(8px)',padding:'14px 16px',display:'flex',alignItems:'center',gap:10,
    borderBottom:'1px solid rgba(255,255,255,.07)'},
  title:{fontSize:17,fontWeight:700,flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'},
  iconBtn:{background:'none',border:'none',color:'#e8e4dc',fontSize:18,padding:'6px 8px',borderRadius:8},
  card:{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',

function RoleBadge({role}){
  const r=ROLES[role]||ROLES.input;
  return h('span',{style:S.badge},r.icon+' '+r.label);
}
function Toast({msg}){ return msg? h('div',{style:S.toast},msg):null; }

/* ===== 添付画像 ===== */
function AttachedImage({fileKey}){
  const [url,setUrl]=useState(null);
  useEffect(()=>{
    let revoke=null;
    repo.getFile(fileKey).then(blob=>{
      if(blob){ revoke=URL.createObjectURL(blob); setUrl(revoke); }
    });
    return ()=>{ if(revoke) URL.revokeObjectURL(revoke); };
  },[fileKey]);
  if(!url) return h('div',{style:{...S.sub,margin:'0 16px'}},'画像を読み込み中…');
  return h('img',{src:url,style:{maxWidth:'calc(100% - 32px)',margin:'0 16px',
    borderRadius:12,border:'1px solid rgba(255,255,255,.1)'}});
}

/* ===== 追加シート ===== */
function AddSheet({onClose,onPickImage,onPickImages,onAddText}){
  const fileRef=useRef(null);
  const multiRef=useRef(null);
  const ocrRef=useRef(true);
  return h('div',{style:S.sheetWrap,onClick:onClose},
    h('div',{style:S.sheet,onClick:e=>e.stopPropagation()},
      h('input',{type:'file',accept:'image/*',ref:fileRef,style:{display:'none'},
        onChange:e=>{
          const f=e.target.files[0];
          if(f){ onPickImage(f,ocrRef.current); }
          e.target.value='';
        }}),
      h('input',{type:'file',accept:'image/*',multiple:true,ref:multiRef,
        style:{display:'none'},'data-testid':'multi-image-input',
        onChange:e=>{
          const files=[...e.target.files];
          if(files.length>0){ onPickImages(files); }
          e.target.value='';
        }}),
      h('button',{style:S.sheetItem,onClick:()=>multiRef.current.click()},
        '📚',h('span',null,'複数画像から文章を登録（ワークフロー）',
          h('div',{style:S.sub},'選んだ順にOCR→結合。重なった部分は自動削除＋プロンプトで仕上げ'))),
      h('button',{style:S.sheetItem,onClick:()=>{ocrRef.current=true;fileRef.current.click();}},
        '🔍',h('span',null,'画像からOCR',
          h('div',{style:S.sub},'端末内で文字認識（初回はモデル取得のためネット接続が必要）'))),
      h('button',{style:S.sheetItem,onClick:()=>{ocrRef.current=false;fileRef.current.click();}},
        '🖼️',h('span',null,'画像を取り込むだけ',
          h('div',{style:S.sub},'OCRせずに画像を資産として保存'))),
      h('button',{style:S.sheetItem,onClick:onAddText},
        '📝',h('span',null,'テキストを追加')),
    ));
}

/* ===== プロンプト追加・編集フォーム ===== */
function PromptFormModal({initial,categories,onClose,onSaved}){
  const [form,setForm]=useState(initial);
  const save=async()=>{
    if(!form.name.trim()||!form.promptText.trim()) return;
    await repo.savePrompt({
      promptId: form.promptId || ('user_'+Date.now().toString(36)),
      name: form.name.trim(),
      category: (form.category||'').trim(),
      promptText: form.promptText,
    });
    onSaved();
  };
  return h('div',{style:S.modalWrap,onClick:onClose},
    h('div',{style:S.modal,onClick:e=>e.stopPropagation()},
      h('div',{style:{fontSize:16,fontWeight:700,marginBottom:14}},
        form.promptId?'プロンプトを編集':'プロンプトを追加'),
      h('input',{style:{...S.input,marginBottom:10},placeholder:'プロンプト名',
        value:form.name,autoFocus:!form.promptId,
        onChange:e=>setForm({...form,name:e.target.value})}),
      h('input',{style:{...S.input,marginBottom:10},placeholder:'ジャンル（省略可・例: 整形 / 要約 / 翻訳）',
        list:'prompt-category-list',value:form.category||'',
        onChange:e=>setForm({...form,category:e.target.value})}),
      h('datalist',{id:'prompt-category-list'},
        (categories||[]).map(c=>h('option',{key:c,value:c}))),
      h('textarea',{style:{...S.textarea,minHeight:160},
        placeholder:'プロンプト本文（本文は自動で先頭に追加されます。位置を指定したい場合は{{content}}を使用）',
        value:form.promptText,
        onChange:e=>setForm({...form,promptText:e.target.value})}),
      h('div',{style:{...S.sub,marginTop:6}},
        '{{content}}を書かなくても本文は自動で先頭に付きます。位置を指定したい場合は '+
        '{{title}} / {{content}} / {{rawContent}} が使えます'),
      h('div',{style:{display:'flex',gap:10,justifyContent:'flex-end',marginTop:14}},
        h('button',{style:S.ghostBtn,onClick:onClose},'キャンセル'),
        h('button',{style:S.primaryBtn,
          disabled:!form.name.trim()||!form.promptText.trim(),
          onClick:save},'保存'))));
}

/* ===== 編集画面 ===== */
function EditView({itemId,onBack,onChanged,showToast,profiles}){
  const [item,setItem]=useState(null);
  const [source,setSource]=useState(null);
  const [derived,setDerived]=useState([]);
  const [logs,setLogs]=useState([]);
  const [title,setTitle]=useState('');
  const [content,setContent]=useState('');
  const [copyOpen,setCopyOpen]=useState(false);
  const [prompts,setPrompts]=useState([]);
  const [promptQuery,setPromptQuery]=useState('');
  const [promptListOpen,setPromptListOpen]=useState(false);
  const [promptForm,setPromptForm]=useState(null);
  const [promptCategory,setPromptCategory]=useState(''); /* ''=すべて */
  const [selectedPromptIds,setSelectedPromptIds]=useState(()=>new Set());

  const reload=useCallback(async()=>{
    const it=await repo.fetchItem(itemId);
    if(!it){ onBack(); return; }
    setItem(it); setTitle(it.title); setContent(it.content||'');
    setSource(it.sourceItemId ? await repo.fetchItem(it.sourceItemId) : null);
    setDerived(await repo.fetchDerived(itemId));
    setLogs(await repo.fetchLogs(itemId));
    setPrompts(await repo.fetchPrompts());
  },[itemId,onBack]);
  useEffect(()=>{ reload(); },[reload]);

  if(!item) return h('div',{style:{padding:40,textAlign:'center',color:'#888'}},'読み込み中…');

  const save=async()=>{
    await repo.saveItem({...item,title,content});
    await repo.saveLog(item.id,'edit','内容を編集');
    showToast('保存しました'); reload(); onChanged();
  };
  const copyWith=async(profile)=>{
    setCopyOpen(false);
    const ok=await copyText(renderTemplate(profile.templateText,{...item,title,content}));
    await repo.saveLog(item.id,'copy',`「${profile.name}」形式でコピー`);
    showToast(ok?`「${profile.name}」形式でコピーしました`:'コピーに失敗しました');
    reload();
  };
  const copyWithPrompt=async(prompt)=>{
    setPromptQuery('');
    const ok=await copyText(renderPromptCopy(prompt.promptText,{...item,title,content}));
    await repo.saveLog(item.id,'copy',`プロンプト「${prompt.name}」でコピー`);
    showToast(ok
      ?`プロンプト「${prompt.name}」でコピーしました。AIに貼り付けてください`
      :'コピーに失敗しました');
    reload();
  };
  const toggleSelectPrompt=(promptId)=>{
    setSelectedPromptIds(prev=>{
      const next=new Set(prev);
      if(next.has(promptId)) next.delete(promptId); else next.add(promptId);
      return next;
    });
  };
  const copySelectedPrompts=async()=>{
    const selected=prompts.filter(p=>selectedPromptIds.has(p.promptId));
    if(selected.length===0) return;
    const ok=await copyText(renderCombinedPromptCopy(selected,{...item,title,content}));
    await repo.saveLog(item.id,'copy',`プロンプト${selected.length}件でまとめてコピー`);
    showToast(ok
      ?`プロンプト${selected.length}件でまとめてコピーしました。AIに貼り付けてください`
      :'コピーに失敗しました');
    setSelectedPromptIds(new Set());
    reload();
  };
  const removePrompt=async(p)=>{
    if(!confirm(`プロンプト「${p.name}」を削除しますか？`)) return;
    await repo.deletePrompt(p.promptId);
    setPrompts(await repo.fetchPrompts());
  };
  const toggleFavoritePrompt=async(p)=>{
    await repo.toggleFavorite(p.promptId);
    setPrompts(await repo.fetchPrompts());
  };
  const finalize=async()=>{
    const now=Date.now();
    const fin={title:`${title}（確定版）`,content,rawContent:item.rawContent,
      role:'finalized',sourceItemId:item.id,fileKey:null,
      metadata:{source:'finalize',sourceItemId:item.id},createdAt:now,updatedAt:now};
    const newId=await repo.saveItem(fin);
    await repo.saveLog(newId,'create',`「${title}」から確定版を作成`);
    showToast('確定版を作成しました'); reload(); onChanged();
  };
  const remove=async()=>{
    if(!confirm('このアイテムと操作ログ、添付ファイルを削除します。よろしいですか？')) return;
    const keys=item.fileKeys || (item.fileKey?[item.fileKey]:[]);
    for(const k of keys) await repo.deleteFile(k);
    await repo.deleteItem(item.id);
    onChanged(); onBack();
  };

  return h('div',{style:S.page},
    h('div',{style:S.header},
      h('button',{style:S.iconBtn,onClick:onBack},'←'),
      h('div',{style:S.title},item.title),
      h('button',{style:S.iconBtn,title:'コピー',onClick:()=>setCopyOpen(true)},'📄'),
      h('button',{style:S.iconBtn,title:'確定版を作成',onClick:finalize},'✅'),
      h('button',{style:S.iconBtn,title:'削除',onClick:remove},'🗑️'),
    ),
    h('div',{style:{padding:'14px 16px 0',display:'flex',alignItems:'center',gap:8}},
      h(RoleBadge,{role:item.role}),
      h('span',{style:{...S.sub,marginLeft:'auto'}},'更新: '+fmtDate(item.updatedAt))),
    h('div',{style:{padding:'12px 16px 0'}},
      h('input',{style:S.input,value:title,placeholder:'タイトル',
        onChange:e=>setTitle(e.target.value)})),
    h('div',{style:{padding:'10px 16px 0'}},
      h('textarea',{style:{...S.textarea,minHeight:200},value:content,placeholder:'本文',
        onChange:e=>setContent(e.target.value)})),
    h('div',{style:{padding:'12px 16px 0'}},
      h('button',{style:{...S.primaryBtn,width:'100%'},onClick:save},'保存')),

    /* ===== プロンプトでコピー（本文の下・お気に入り＋検索＋折りたたみ一覧） ===== */
    h('div',{style:S.sectionTitle},'プロンプトでコピー（外部AIに貼り付け）'),
    (()=>{
      const favorites=prompts.filter(p=>p.favorite);
      if(favorites.length===0) return null;
      return h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,margin:'0 16px 8px'}},
        favorites.map(p=>h('button',{key:p.promptId,
          style:{...S.badge,cursor:'pointer',border:'1px solid rgba(255,196,0,.4)',
            background:'rgba(255,196,0,.12)',color:'#ffd166'},
          onClick:()=>copyWithPrompt(p)},'⭐ '+p.name)));
    })(),
    h('div',{style:{position:'relative',margin:'0 16px'}},
      h('input',{style:S.input,placeholder:'プロンプトを検索…',value:promptQuery,
        onChange:e=>setPromptQuery(e.target.value)}),
      (()=>{ /* 入力予測：一致するプロンプト名を候補表示（お気に入り優先）、タップでコピー */
        const q=promptQuery.trim();
        if(!q) return null;
        const hits=prompts.filter(p=>p.name.includes(q)||p.promptText.includes(q))
          .sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0)).slice(0,5);
        if(hits.length===0) return null;
        return h('div',{style:{position:'absolute',left:0,right:0,top:'100%',zIndex:15,
          background:'#1c2333',border:'1px solid rgba(122,150,208,.4)',borderRadius:10,
          marginTop:4,overflow:'hidden',boxShadow:'0 6px 20px rgba(0,0,0,.45)'}},
          hits.map(p=>h('button',{key:p.promptId,
            style:{display:'block',width:'100%',textAlign:'left',padding:'11px 14px',
              background:'none',border:'none',color:'#e8e4dc',fontSize:14},
            onClick:()=>copyWithPrompt(p)},(p.favorite?'⭐':'✨')+' '+p.name)));
      })()),
    h('button',{style:{background:'none',border:'none',color:'#a8bce0',fontSize:13,
        padding:'10px 16px 2px',textAlign:'left',width:'100%'},
      onClick:()=>setPromptListOpen(!promptListOpen)},
      `${promptListOpen?'▾':'▸'} プロンプト一覧（${prompts.length}件）`),
    promptListOpen && h('div',{style:{padding:'2px 12px 0'}},
      /* 複数選択中のみ表示するアクションバー（同じ本文を複数プロンプトでまとめてコピー） */
      selectedPromptIds.size>0 && h('div',{style:{display:'flex',alignItems:'center',gap:8,
          padding:'6px 4px',margin:'0 0 6px'}},
        h('span',{style:S.sub},`${selectedPromptIds.size}件選択中`),
        h('button',{style:{...S.primaryBtn,padding:'6px 14px',fontSize:13,width:'auto'},
          onClick:copySelectedPrompts},'まとめてコピー'),
        h('button',{style:{...S.ghostBtn,padding:'6px 14px',fontSize:13,width:'auto'},
          onClick:()=>setSelectedPromptIds(new Set())},'解除')),
      /* ジャンル絞り込みチップ（すべて + 各カテゴリ・件数付き、未分類は最後） */
      (()=>{
        const counts={};
        prompts.forEach(p=>{const c=(p.category||'').trim()||UNCATEGORIZED;
          counts[c]=(counts[c]||0)+1;});
        const cats=Object.keys(counts).sort((a,b)=>
          a===UNCATEGORIZED?1:b===UNCATEGORIZED?-1:a.localeCompare(b,'ja'));
        if(cats.length<=1) return null; /* カテゴリが1種類以下ならチップ不要 */
        const chip=(key,label,active)=>h('button',{key,
          style:{...S.badge,cursor:'pointer',whiteSpace:'nowrap',
            border:active?'1px solid rgba(122,150,208,.7)':'1px solid rgba(255,255,255,.12)',
            background:active?'rgba(122,150,208,.28)':'rgba(255,255,255,.04)',
            color:active?'#dbe4f5':'#aaa'},
          onClick:()=>setPromptCategory(active&&key!==''?'':key)},label);
        return h('div',{style:{display:'flex',flexWrap:'wrap',gap:6,padding:'0 4px 8px'}},
          chip('','すべて',promptCategory===''),
          cats.map(c=>chip(c,`${c} (${counts[c]})`,promptCategory===c)));
      })(),
      prompts
        .filter(p=>{const q=promptQuery.trim();
          return !q||p.name.includes(q)||p.promptText.includes(q);})
        .filter(p=>{if(!promptCategory) return true;
          return ((p.category||'').trim()||UNCATEGORIZED)===promptCategory;})
        .sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0))
        .map(p=>h('div',{key:p.promptId,
          style:{display:'flex',alignItems:'center',gap:4}},
          h('input',{type:'checkbox',checked:selectedPromptIds.has(p.promptId),
            onChange:()=>toggleSelectPrompt(p.promptId)}),
          h('button',{style:S.iconBtn,title:p.favorite?'お気に入り解除':'お気に入りに追加',
            onClick:()=>toggleFavoritePrompt(p)},p.favorite?'⭐':'☆'),
          h('button',{style:{...S.sheetItem,flex:1,borderRadius:10,padding:'10px 8px',
              alignItems:'center'},
            onClick:()=>copyWithPrompt(p)},
            '✨',h('span',{style:{flex:1}},p.name),
            h('span',{style:{...S.sub,flexShrink:0}},(p.category||'').trim()||UNCATEGORIZED)),
          h('button',{style:S.iconBtn,title:'編集',
            onClick:()=>setPromptForm({promptId:p.promptId,name:p.name,
              category:p.category||'',promptText:p.promptText})},'✏️'),
          h('button',{style:S.iconBtn,title:'削除',onClick:()=>removePrompt(p)},'🗑️'))),
      h('button',{style:{...S.ghostBtn,width:'100%',marginTop:6},
        onClick:()=>setPromptForm({name:'',category:'',promptText:''})},'＋ プロンプトを追加')),

    (()=>{
      const keys=item.fileKeys || (item.fileKey?[item.fileKey]:[]);
      return keys.length>0 && h(React.Fragment,null,
        h('div',{style:S.sectionTitle},
          keys.length>1?`添付画像（${keys.length}枚）`:'添付画像'),
        keys.map(k=>h('div',{key:k,style:{marginBottom:8}},
          h(AttachedImage,{fileKey:k}))));
    })(),

    (source||derived.length>0) && h(React.Fragment,null,
      h('div',{style:S.sectionTitle},'関連（ナレッジグラフ）'),
      source && h('div',{style:{...S.card,display:'flex',alignItems:'center',gap:8},
        onClick:()=>{onBack();setTimeout(()=>window._openItem&&window._openItem(source.id),0);}},
        ROLES[source.role]?.icon||'📥',
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},source.title),
          h('div',{style:S.sub},'元アイテム')),'›'),
      derived.map(d=>h('div',{key:d.id,style:{...S.card,display:'flex',alignItems:'center',gap:8},
        onClick:()=>{onBack();setTimeout(()=>window._openItem&&window._openItem(d.id),0);}},
        ROLES[d.role]?.icon||'📥',
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},d.title),
          h('div',{style:S.sub},'派生アイテム')),'›'))),

    h('div',{style:S.sectionTitle},'操作ログ'),
    logs.length===0
      ? h('div',{style:{...S.sub,margin:'0 16px 24px'}},'ログはまだありません')
      : logs.map(l=>h('div',{key:l.id,
          style:{display:'flex',gap:10,alignItems:'baseline',padding:'6px 16px',fontSize:13}},
          h('span',null,(LOG_ACTIONS[l.action]||{}).icon||'・'),
          h('span',{style:{flex:1}},l.description||(LOG_ACTIONS[l.action]||{}).label||l.action),
          h('span',{style:S.sub},fmtDate(l.executedAt)))),
    h('div',{style:{height:40}}),
    copyOpen && h(CopyModal,{profiles,onClose:()=>setCopyOpen(false),onSelect:copyWith}),
    promptForm && h(PromptFormModal,{initial:promptForm,
      categories:[...new Set(prompts.map(p=>(p.category||'').trim()).filter(Boolean))]
        .sort((a,b)=>a.localeCompare(b,'ja')),
      onClose:()=>setPromptForm(null),
      onSaved:async()=>{setPromptForm(null);setPrompts(await repo.fetchPrompts());}}),
  );
}

/* ===== 一覧（Inbox） ===== */
function InboxView({items,onOpen,onAdd,busy,onExport,onImportFile,onAddPrompt}){
  const importRef=useRef(null);
  return h('div',{style:S.page},
    h('div',{style:S.header},
      h('div',{style:S.title},'AI Workspace'),
      busy && h('span',{style:S.sub},busy),
      h('input',{type:'file',accept:'.json,application/json',ref:importRef,
        style:{display:'none'},
        onChange:e=>{
          const f=e.target.files[0];
          if(f) onImportFile(f);
          e.target.value='';
        }}),
      h('button',{style:S.iconBtn,title:'プロンプトを追加',onClick:onAddPrompt},'✨+'),
      h('button',{style:S.iconBtn,title:'バックアップをエクスポート',onClick:onExport},'⬇️'),
      h('button',{style:S.iconBtn,title:'バックアップをインポート',
        onClick:()=>importRef.current.click()},'⬆️')),
    items.length===0
      ? h('div',{style:{textAlign:'center',color:'#888',marginTop:100,lineHeight:2}},
          h('div',{style:{fontSize:40}},'🗂️'),
          'アイテムがありません',h('br'),
          h('span',{style:S.sub},'右下の＋から画像OCRまたはテキストを追加'))
      : h('div',{style:{paddingTop:10,paddingBottom:110}},
          items.map(it=>{
            const snippet=(it.content||'').replace(/\n/g,' ').slice(0,80);
            return h('div',{key:it.id,style:S.card,onClick:()=>onOpen(it.id)},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
                h('span',null,(ROLES[it.role]||{}).icon||'📥'),
                h('div',{style:{fontWeight:600,flex:1,minWidth:0,whiteSpace:'nowrap',
                  overflow:'hidden',textOverflow:'ellipsis'}},it.title)),
              snippet && h('div',{style:{fontSize:13,color:'#aaa',marginBottom:6,
                overflow:'hidden',display:'-webkit-box',WebkitLineClamp:2,
                WebkitBoxOrient:'vertical'}},snippet),
              h('div',{style:{display:'flex',alignItems:'center',gap:8}},
                h(RoleBadge,{role:it.role}),
                (it.fileKeys&&it.fileKeys.length>0
                  ? h('span',{style:S.sub},`📎${it.fileKeys.length>1?it.fileKeys.length:''}`)
                  : it.fileKey && h('span',{style:S.sub},'📎')),
                h('span',{style:{...S.sub,marginLeft:'auto'}},fmtDate(it.createdAt))));
          })),
    h('button',{style:S.fab,onClick:onAdd},'＋'),
  );
}

/* ===== アプリ本体 ===== */
function App(){
  const [items,setItems]=useState([]);
  const [profiles,setProfiles]=useState([]);
  const [view,setView]=useState({name:'inbox'});
  const [sheetOpen,setSheetOpen]=useState(false);
  const [textModal,setTextModal]=useState(false);
  const [homePromptForm,setHomePromptForm]=useState(null);
  const [homePromptCategories,setHomePromptCategories]=useState([]);
  const [busy,setBusy]=useState('');
  const [toast,setToast]=useState('');

  const showToast=useCallback(msg=>{
    setToast(msg); setTimeout(()=>setToast(''),2200);
  },[]);
  const reload=useCallback(async()=>{ setItems(await repo.fetchAllItems()); },[]);

  useEffect(()=>{
    (async()=>{
      await repo.seedProfiles();
      await repo.seedPrompts();
      setProfiles(await repo.fetchProfiles());
      await reload();
    })();
  },[reload]);

  /* 関連アイテムからの画面遷移用フック */
  useEffect(()=>{ window._openItem=id=>setView({name:'edit',id}); },[]);

  /* ホーム画面からもプロンプトを追加できるようにする（アイテムを開かなくてよい） */
  const openAddPromptFromHome=async()=>{
    const prompts=await repo.fetchPrompts();
    setHomePromptCategories(
      [...new Set(prompts.map(p=>(p.category||'').trim()).filter(Boolean))]
        .sort((a,b)=>a.localeCompare(b,'ja')));
    setHomePromptForm({name:'',category:'',promptText:''});
  };

  const addText=async(title,text)=>{
    setTextModal(false);
    const now=Date.now();
    const id=await repo.saveItem({
      title:title||('TEXT_'+now), content:text, rawContent:text,
      role:'input', sourceItemId:null, fileKey:null,
      metadata:{source:'text'}, createdAt:now, updatedAt:now});
    await repo.saveLog(id,'create','テキスト入力から作成');
    await reload(); showToast('追加しました');
  };

  const importImage=async(file,withOcr)=>{
    setSheetOpen(false);
    const now=Date.now();
    /* 1. 先に画像を保存（OCR失敗・中断でも画像は失われない） */
    setBusy('画像を保存中…');
    const fileKey=await repo.saveFile(file,file.name||('image_'+now+'.jpg'));
    let text='', ocrError=null, ocrMs=0;
    if(withOcr){
      try{
        const t0=Date.now();
        setBusy('OCR準備中…');
        text=await runOcr(file,p=>setBusy('OCR中… '+Math.round(p*100)+'%'));
        ocrMs=Date.now()-t0;
      }catch(e){ ocrError=String(e.message||e); }
    }
    setBusy('');
    const id=await repo.saveItem({
      title:'OCR_'+now, content:text, rawContent:text,
      role:'input', sourceItemId:null, fileKey,
      metadata:{source:'image',fileName:file.name,fileSize:file.size,
        ocrDurationMs:ocrMs,...(ocrError?{ocrError}:{})},
      createdAt:now, updatedAt:now});
    await repo.saveLog(id,'ocr',
      withOcr ? (ocrError?('OCR失敗（画像は保存済み）: '+ocrError):'画像から文字を抽出')
              : '画像を取り込み（OCRなし）');
    await reload();
    showToast(ocrError?'OCRに失敗しましたが画像は保存しました':'追加しました');
    setView({name:'edit',id});
  };

  /* ワークフロー: 複数画像→順次OCR→重複トリム結合→1アイテム登録→ログ */
  const importMultipleImages=async(files)=>{
    setSheetOpen(false);
    if(files.length===0) return;
    const now=Date.now();

    /* 1. 先に全画像を保存（OCR失敗・中断でも画像は失われない） */
    const fileKeys=[];
    for(let i=0;i<files.length;i++){
      setBusy(`画像を保存中… ${i+1}/${files.length}`);
      fileKeys.push(await repo.saveFile(files[i],
        files[i].name||`image_${now}_${i+1}.jpg`));
    }

    /* 2. 選んだ順に連続OCR */
    const rawParts=[], okTexts=[], ocrErrors=[];
    for(let i=0;i<files.length;i++){
      try{
        const text=await runOcr(files[i],
          p=>setBusy(`OCR中 ${i+1}/${files.length} … ${Math.round(p*100)}%`));
        rawParts.push(`----- 画像${i+1} -----\n${text}`);
        okTexts.push(text);
      }catch(e){
        ocrErrors.push(`画像${i+1}: ${String(e.message||e)}`);
        rawParts.push(`----- 画像${i+1}（OCR失敗） -----`);
      }
    }
    setBusy('');

    /* 3. 重なった部分を自動トリムしながら結合 */
    let merged='', trimmedCount=0;
    for(const t of okTexts){
      if(!merged){ merged=t.trim(); continue; }
      const r=trimOverlap(merged,t);
      if(r.trimmed) trimmedCount++;
      if(r.text.trim()) merged=merged.replace(/\s+$/,'')+'\n'+r.text.trim();
    }

    /* 4. 1つのアイテムとして登録 */
    const id=await repo.saveItem({
      title:'まとめ読取_'+now, content:merged, rawContent:rawParts.join('\n\n'),
      role:'input', sourceItemId:null, fileKey:null, fileKeys,
      metadata:{source:'multiImage', imageCount:files.length, trimmedCount,
        ...(ocrErrors.length?{ocrErrors}:{})},
      createdAt:now, updatedAt:now});
    await repo.saveLog(id,'workflowRun',
      `複数画像OCRワークフロー（${files.length}枚・重複トリム${trimmedCount}箇所`+
      (ocrErrors.length?`・OCR失敗${ocrErrors.length}枚`:'')+'）');
    await reload();
    showToast('登録しました。本文下のプロンプト検索からAI仕上げができます');
    setView({name:'edit',id});
  };

  /* バックアップ: 全データ＋添付画像をJSONにエクスポート */
  const exportBackup=async()=>{
    const data=await repo.exportAll();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const date=new Date().toISOString().slice(0,10);
    a.href=url; a.download=`ai-workspace-backup-${date}.json`;
    a.click(); URL.revokeObjectURL(url);
    showToast('バックアップをエクスポートしました');
  };
  /* バックアップの読み込み: 既存データは保持したまま追加する（上書き・削除はしない） */
  const importBackup=async(file)=>{
    let data;
    try{
      data=JSON.parse(await file.text());
    }catch(e){
      showToast('JSONの読み込みに失敗しました'); return;
    }
    if(!data||!Array.isArray(data.items)){
      showToast('不正なバックアップファイルです'); return;
    }
    if(!confirm(`「${file.name}」を読み込みます。\nアイテム${data.items.length}件を追加します（既存のデータは残ります）。よろしいですか？`))
      return;
    setBusy('インポート中…');
    try{
      const result=await repo.importAll(data);
      await reload();
      setProfiles(await repo.fetchProfiles());
      showToast(`インポート完了: アイテム${result.itemCount}件・ログ${result.logCount}件`);
    }catch(e){
      showToast('インポートに失敗しました: '+(e.message||e));
    }
    setBusy('');
  };

  return h(React.Fragment,null,
    view.name==='inbox'
      ? h(InboxView,{items,busy,onOpen:id=>setView({name:'edit',id}),
          onAdd:()=>setSheetOpen(true),onExport:exportBackup,onImportFile:importBackup,
          onAddPrompt:openAddPromptFromHome})
      : h(EditView,{itemId:view.id,profiles,showToast,
          onBack:()=>setView({name:'inbox'}),onChanged:reload}),
    homePromptForm && h(PromptFormModal,{initial:homePromptForm,
      categories:homePromptCategories,
      onClose:()=>setHomePromptForm(null),
      onSaved:()=>{setHomePromptForm(null);showToast('プロンプトを追加しました');}}),
    sheetOpen && h(AddSheet,{onClose:()=>setSheetOpen(false),
      onPickImage:importImage,
      onPickImages:importMultipleImages,
      onAddText:()=>{setSheetOpen(false);setTextModal(true);}}),
    textModal && h(AddTextModal,{onClose:()=>setTextModal(false),onSave:addText}),
    h(Toast,{msg:toast}),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
