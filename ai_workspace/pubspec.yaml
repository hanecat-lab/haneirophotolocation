name: ai_workspace
description: "Local-first, serverless AI Workspace. Knowledge workspace for the AI era."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0
  # Community-maintained Isar fork: same API as isar 3.x, but its generator
  # supports current Dart SDK / analyzer versions (upstream isar 3.1.0+1 is
  # unmaintained and its generator crashes on modern SDKs).
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.6
  image_picker: ^1.2.3
  google_mlkit_text_recognition: ^0.16.0
  idb_shim: ^2.9.6+2
  uuid: ^4.5.3
  cross_file: ^0.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0
  isar_community_generator: ^3.3.2

flutter:
  uses-material-design: true
