<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{ font-size: 16px; }
  html,body{height:100%;overscroll-behavior:none;}
  body{
    font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
    background:#0a0a0f; color:#e8e4dc;
    min-height:100vh; min-height:-webkit-fill-available;
  }
  #app{
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; min-height:-webkit-fill-available;
    padding-bottom:env(safe-area-inset-bottom);
  }
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:#555;border-radius:2px;}
  input,textarea,select,button{font-family:inherit;}
  button{cursor:pointer;}
  .flash{position:fixed;inset:0;background:#fff;pointer-events:none;opacity:0;transition:opacity .4s;z-index:999;}
  .flash.on{opacity:.45;}
  /* calendar day */
  .cal-day{
    aspect-ratio:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;border-radius:8px;gap:3px;
    transition:background .15s;
  }
  .cal-day.has{cursor:pointer;}
  .dot{width:5px;height:5px;border-radius:50%;}
  /* modal overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .modal-box{
    border-radius:14px;padding:24px;width:100%;max-width:380px;
    max-height:80vh;overflow-y:auto;
  }
  /* shutter spin */
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{animation:spin 1s linear infinite;}
  /* safe area top padding — ステータスバー(約50px) + 余白16px を確保 */
  .safe-top{padding-top:max(72px, calc(env(safe-area-inset-top) + 16px));}
</style>

</head>

<div id="app"></div>

<script>
'use strict';
const {useState,useCallback,useEffect,useRef} = React;
const h = React.createElement;

// -- constants ------------------------------------------
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const FOLDER_COLORS = ['#c8b89a','#7eb8a4','#a07eb8','#e08080','#7896d0','#c8a060','#80b880'];
const BG_PRESETS = [
  {label:'ダーク',   bg:'#0a0a0f'},
  {label:'チャコール',bg:'#1c1c22'},
  {label:'ネイビー', bg:'#0d1117'},
  {label:'フォレスト',bg:'#0f1a12'},
  {label:'ライト',   bg:'#f5f2ee'},
  {label:'クリーム', bg:'#faf6ef'},
  {label:'スカイ',   bg:'#e8f0f8'},
  {label:'ペーパー', bg:'#f0ede6'},
];
const STORAGE_KEY = 'photo-location-v1';

// -- weather --------------------------------------------
const WEATHERS = [
  {id:'sunny',    icon:'☀️',  label:'晴れ'},
  {id:'cloudy',   icon:'⛅',  label:'曇り'},
  {id:'overcast', icon:'☁️',  label:'曇天'},
  {id:'rainy',    icon:'🌧️', label:'雨'},
  {id:'stormy',   icon:'⛈️', label:'雷雨'},
  {id:'snowy',    icon:'❄️',  label:'雪'},
  {id:'foggy',    icon:'🌫️', label:'霧'},
  {id:'windy',    icon:'💨',  label:'風'},
  {id:'hot',      icon:'🌡️', label:'猛暑'},
  {id:'night',    icon:'🌙',  label:'夜'},
];

// -- utils ----------------------------------------------
function fmt(d){ return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}); }
function toYMD(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function luminance(hex){
  const h2=hex.replace('#','');
  const r=parseInt(h2.slice(0,2),16)/255,g=parseInt(h2.slice(2,4),16)/255,b=parseInt(h2.slice(4,6),16)/255;
  const lin=c=>c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);
}
function isDark(hex){ return luminance(hex)<0.4; }

function makeTheme(bg){
  const d=isDark(bg);
  return {
    bg,
    text:        d?'#e8e4dc':'#1a1814',
    textSub:     d?'#888':'#666',
    textMuted:   d?'#555':'#999',
    textFaint:   d?'#333':'#bbb',
    accent:      d?'#c8b89a':'#7a6a52',

function calcSun(dateStr, lat, lng){
  var d = new Date(dateStr + 'T12:00:00');
  var JD = d.getTime() / 86400000 + 2440587.5;
  var n  = JD - 2451545.0;
  var Lo = (280.46 + 0.9856474 * n) % 360;
  var go = (357.528 + 0.9856003 * n) % 360;
  var gr = go * Math.PI / 180;
  var lm = Lo + 1.915 * Math.sin(gr) + 0.020 * Math.sin(2 * gr);
  var lmR = lm * Math.PI / 180;
  var ep = 23.439 - 0.0000004 * n;
  var epR = ep * Math.PI / 180;
  var dec = Math.asin(Math.sin(epR) * Math.sin(lmR)) * 180 / Math.PI;
  var decR = dec * Math.PI / 180;
  var latR = lat * Math.PI / 180;
  var cH = (Math.cos(90.833 * Math.PI / 180) - Math.sin(latR) * Math.sin(decR)) / (Math.cos(latR) * Math.cos(decR));
  if(cH < -1) return {polar:'白夜'};
  if(cH >  1) return {polar:'極夜'};
  var Ha = Math.acos(cH) * 180 / Math.PI;
  var EqT = (Lo - lm) * 4;
  var tzOff = -new Date().getTimezoneOffset(); // 分単位（JSTなら+540）
  var off = lng / 15 * 60;
  var rMin = 720 - Ha * 4 - EqT - off + tzOff;
  var sMin = 720 + Ha * 4 - EqT - off + tzOff;
  function minsToTime(m){
    var tot = ((m % 1440) + 1440) % 1440;
    var hr = Math.floor(tot / 60);
    var mn = Math.round(tot % 60);
    return String(hr).padStart(2,'0') + ':' + String(mn).padStart(2,'0');
  }
  return {rise: minsToTime(rMin), set: minsToTime(sMin)};
}

function distKm(lat1,lng1,lat2,lng2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(km){ return km<1?Math.round(km*1000)+'m':km.toFixed(1)+'km'; }

// -- Compass --------------------------------------------
function Compass({th, locating, gpsPos}){
  const [heading, setHeading] = useState(null);
  const [permErr, setPermErr] = useState(false);
  const headingRef = useRef(null);
  const rafRef     = useRef(null);
  const targetRef  = useRef(0);
  const currentRef = useRef(0);

  // smooth rotation via RAF
  function tick(){
    const diff = targetRef.current - currentRef.current;
    // shortest path
    let d = ((diff % 360) + 540) % 360 - 180;
    currentRef.current += d * 0.12;
    if(headingRef.current){
      headingRef.current.style.transform = `rotate(${-currentRef.current}deg)`;
    }
    rafRef.current = requestAnimationFrame(tick);
  }

  useEffect(()=>{
    rafRef.current = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(rafRef.current);
  },[]);

  useEffect(()=>{
    let cleanup = ()=>{};
    function onOrientation(e){
      // webkitCompassHeading = iOS true north; alpha = generic (south-referenced on some)
      let deg = e.webkitCompassHeading ?? (e.alpha != null ? (360 - e.alpha) : null);
      if(deg == null) return;
      targetRef.current = deg;
      setHeading(Math.round(deg));
    }

    if(typeof DeviceOrientationEvent !== 'undefined'){
      // iOS 13+ requires permission
      if(typeof DeviceOrientationEvent.requestPermission === 'function'){
        DeviceOrientationEvent.requestPermission()
          .then(state=>{
            if(state==='granted'){
              window.addEventListener('deviceorientationabsolute', onOrientation, true);
              window.addEventListener('deviceorientation', onOrientation, true);
              cleanup = ()=>{
                window.removeEventListener('deviceorientationabsolute', onOrientation, true);
                window.removeEventListener('deviceorientation', onOrientation, true);
              };
            } else { setPermErr(true); }
          }).catch(()=>setPermErr(true));
      } else {
        window.addEventListener('deviceorientationabsolute', onOrientation, true);
        window.addEventListener('deviceorientation', onOrientation, true);
        cleanup = ()=>{
          window.removeEventListener('deviceorientationabsolute', onOrientation, true);
          window.removeEventListener('deviceorientation', onOrientation, true);
        };
      }
    }
    return ()=>cleanup();
  },[]);

  const accent = th.accent;
  const dim    = isDark(th.bg) ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const dimMid = isDark(th.bg) ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)';

  // cardinal direction label
  function cardinalDir(deg){
    if(deg==null) return '---';
    const dirs=['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg/45)%8];
  }

  return h('div',{style:{
    position:'relative', width:'100%', borderRadius:16,
    background: isDark(th.bg)?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.03)',
    border:`1px solid ${th.accentBorder}`,
    display:'flex', flexDirection:'column', alignItems:'center',
    padding:'20px 16px 16px', gap:12, overflow:'hidden',
  }},
    // corner brackets
    ...['tl','tr','bl','br'].map(p=>h('div',{key:p,style:{
      position:'absolute', width:14, height:14, zIndex:2, pointerEvents:'none',
      borderTop:   p[0]==='t'?`2px solid ${accent}`:'none',
      borderBottom:p[0]==='b'?`2px solid ${accent}`:'none',
      borderLeft:  p[1]==='l'?`2px solid ${accent}`:'none',
      borderRight: p[1]==='r'?`2px solid ${accent}`:'none',
      top:p[0]==='t'?8:'auto', bottom:p[0]==='b'?8:'auto',
      left:p[1]==='l'?8:'auto', right:p[1]==='r'?8:'auto',
    }})),

    // compass rose
    h('div',{style:{position:'relative', width:190, height:190, flexShrink:0}},

      // outer ring
      h('div',{style:{
        position:'absolute', inset:0, borderRadius:'50%',
        border:`1px solid ${dimMid}`,
        background:`radial-gradient(circle, ${isDark(th.bg)?'#111':'#f0ede6'} 0%, ${isDark(th.bg)?'#0a0a0f':'#e8e4dc'} 100%)`,
      }}),

      // tick marks (every 30)
      ...[...Array(12)].map((_,i)=>{
        const a = i*30, major = i%3===0;
        const r = 90;
        const rad = (a-90)*Math.PI/180;
        const x1 = 95 + (r - (major?12:7)) * Math.cos(rad);
        const y1 = 95 + (r - (major?12:7)) * Math.sin(rad);
        const x2 = 95 + r * Math.cos(rad);
        const y2 = 95 + r * Math.sin(rad);
        return h('svg',{key:i,style:{position:'absolute',inset:0,width:'100%',height:'100%',overflow:'visible'},viewBox:'0 0 190 190'},
          h('line',{x1,y1,x2,y2,stroke:major?dimMid:dim,strokeWidth:major?1.5:1})
        );
      }),

      // rotating needle group
      h('div',{ref:headingRef,style:{
        position:'absolute', inset:0,
        transformOrigin:'50% 50%',
        // initial will be set by RAF
      }},
        // N label
        h('div',{style:{
          position:'absolute', top:4, left:'50%', transform:'translateX(-50%)',
          fontSize:13, fontWeight:700, color:'#e05050', fontFamily:'DM Mono', letterSpacing:1,
        }},'N'),
        // S label
        h('div',{style:{
          position:'absolute', bottom:4, left:'50%', transform:'translateX(-50%)',
          fontSize:11, fontWeight:400, color:th.textMuted, fontFamily:'DM Mono',
        }},'S'),
        // E label
        h('div',{style:{
          position:'absolute', right:6, top:'50%', transform:'translateY(-50%)',
          fontSize:11, color:th.textMuted, fontFamily:'DM Mono',
        }},'E'),
        // W label
        h('div',{style:{
          position:'absolute', left:6, top:'50%', transform:'translateY(-50%)',
          fontSize:11, color:th.textMuted, fontFamily:'DM Mono',
        }},'W'),

        // needle (SVG triangle)
        h('svg',{style:{position:'absolute',inset:0,width:'100%',height:'100%'},viewBox:'0 0 190 190',overflow:'visible'},
          // north (red)
          h('polygon',{points:'95,28 100,95 90,95',fill:'#e05050',opacity:0.95}),
          // south (accent)
          h('polygon',{points:'95,162 100,95 90,95',fill:accent,opacity:0.7}),
          // center dot
          h('circle',{cx:95,cy:95,r:6,fill:th.modalBg,stroke:accent,strokeWidth:1.5}),
          h('circle',{cx:95,cy:95,r:2.5,fill:accent}),
        )
      ),

      // fixed crosshair ring
      h('div',{style:{
        position:'absolute', inset:'30%',
        borderRadius:'50%', border:`1px dashed ${dimMid}`,
        pointerEvents:'none',
      }}),
    ),

    // degree display
    h('div',{style:{display:'flex',alignItems:'baseline',gap:8}},
      h('span',{style:{fontFamily:'DM Mono',fontSize:28,fontWeight:400,color:accent,letterSpacing:1}},
        heading!=null ? String(heading).padStart(3,'0')+'°' : '---'
      ),
      h('span',{style:{fontFamily:'DM Mono',fontSize:14,color:th.textSub,minWidth:28}},
        cardinalDir(heading)
      )
    ),

    // gps coords row
    h('div',{style:{display:'flex',justifyContent:'space-between',width:'100%',
      padding:'6px 10px', borderRadius:8, background:isDark(th.bg)?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)',
      border:`1px solid ${th.cardBorder}`}},
      gpsPos
        ? h(React.Fragment, null,
            h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textSub}},
              gpsPos.lat.toFixed(5)+',  '+gpsPos.lng.toFixed(5)),
            h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textMuted}},'±'+gpsPos.acc+'m')
          )
        : h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textFaint,margin:'0 auto'}},
            locating ? '位置情報取得中...' : '記録ボタンで位置を取得')
    ),

    // permission error
    permErr && h('div',{style:{fontSize:11,color:'#ff9090',textAlign:'center'}},
      'コンパスの許可が必要です（設定 › Safari › モーションと画面の向き）'
    )
  );
}

  // 5
  const RESET_MS = 5 * 60 * 1000;
  useEffect(()=>{
    const LS_KEY = 'photo-loc-active';

    function checkAndReset(){
      const last = parseInt(localStorage.getItem(LS_KEY)||'0', 10);
      if(last && Date.now() - last >= RESET_MS){
        setView('record');
        setSelFolder(null);
        setSelDate(null);
      }
      localStorage.setItem(LS_KEY, Date.now());

    // visibilitychange

      localStorage.setItem(LS_KEY, Date.now());

  function exportFiltered(filterFn, label){
    const filtRecs = records.filter(filterFn);
    const usedFolderIds = new Set(filtRecs.map(r=>r.folderId));
    const filtFolders = folders.filter(f=>usedFolderIds.has(f.id));
    const data = JSON.stringify({folders:filtFolders,records:filtRecs,bgColor,exportedAt:new Date().toISOString()},null,2);
    const blob = new Blob([data],{type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `photo-location-${label}-${date}.json`;
    a.click(); URL.revokeObjectURL(url);
  }

  function importData(e){
    const file = e.target.files?.[0]; if(!file) return;
    const fileName = file.name;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const d = JSON.parse(ev.target.result);
        if(!d.folders||!d.records) throw new Error('invalid');
        // 軽量版レコードを完全版で上書き
        const liteKeys = new Set(
          records.filter(r=>r.lite).map(r=>`${r.date}_${r.time}_${r.lat}_${r.lng}`)
        );
        const restored = d.records.filter(r=>liteKeys.has(`${r.date}_${r.time}_${r.lat}_${r.lng}`));
        const doRestore = ()=>{
          if(restored.length>0){
            setRecords(prev=>{
              const updated = prev.map(r=>{
                if(!r.lite) return r;
                const full = d.records.find(dr=>dr.date===r.date&&dr.time===r.time&&Math.abs(dr.lat-r.lat)<0.0001&&Math.abs(dr.lng-r.lng)<0.0001);
                return full ? {...full, id:r.id} : r;
              });
              const existKeys = new Set(updated.map(r=>`${r.date}_${r.time}`));
              const newRecs = d.records.filter(r=>!existKeys.has(`${r.date}_${r.time}`));
              return [...updated, ...newRecs];
            });
            setFolders(d.folders);
            if(d.bgColor) setBgColor(d.bgColor);
            setImportMsg(`✓ 復元しました（軽量版${restored.length}件を完全版に復元）`);
          } else {
            setFolders(d.folders);
            setRecords(d.records);
            if(d.bgColor) setBgColor(d.bgColor);
            setImportMsg(`✓ ${d.records.length}件の記録を復元しました`);
          }
        };
        setPendingMerge({doRestore, fileName, recordCount:d.records.length});
        setConfirm({type:'restore', message:`「${fileName}」\n${d.records.length}件の記録で復元します。\n現在のデータは上書きされます。`});
      }catch{
        setImportMsg('⚠ ファイルの形式が正しくありません');
      }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function mergeOwnData(e){
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const d = JSON.parse(ev.target.result);
        if(!d.folders||!d.records) throw new Error('invalid');
        const now = Date.now();

        // フォルダーIDのマッピング（既存フォルダーと名前が一致すれば再利用）
        const folderMap = {};
        const addFolders = [];
        d.folders.forEach((f,i)=>{
          const existing = folders.find(ef=>ef.name===f.name);
          if(existing){
            folderMap[f.id] = existing.id;
          } else {
            const newId = `imported_${now}_${i}`;
            folderMap[f.id] = newId;
            addFolders.push({...f, id:newId});
          }
        });

        // 重複チェック（日時+座標）
        const existingKeys = new Set(records.map(r=>`${r.date}_${r.time}_${r.lat.toFixed(4)}_${r.lng.toFixed(4)}`));
        const newRecs = d.records.filter(r=>!existingKeys.has(`${r.date}_${r.time}_${r.lat.toFixed(4)}_${r.lng.toFixed(4)}`));
        const dupRecs = d.records.filter(r=>existingKeys.has(`${r.date}_${r.time}_${r.lat.toFixed(4)}_${r.lng.toFixed(4)}`));

        const doImport = (includedup)=>{
          if(addFolders.length>0) setFolders(p=>[...p,...addFolders]);
          const toAdd = includedup
            ? d.records.map((r,i)=>({...r,id:now+i+1,folderId:folderMap[r.folderId]||null}))
            : newRecs.map((r,i)=>({...r,id:now+i+1,folderId:folderMap[r.folderId]||null}));
          setRecords(p=>[...p,...toAdd]);
          setImportMsg(`✓ ${toAdd.length}件を追加しました${dupRecs.length>0&&!includedup?' (重複'+dupRecs.length+'件はスキップ)':''}`);
        };

        if(dupRecs.length>0){
          setPendingMerge({addFolders, newRecs, allRecs:d.records.map((r,i)=>({...r,id:now+i+1,folderId:folderMap[r.folderId]||null})), dupCount:dupRecs.length, skipRecs:newRecs.map((r,i)=>({...r,id:now+i+1,folderId:folderMap[r.folderId]||null}))});
          setConfirm({type:'mergeOwn', message:`${dupRecs.length}件の重複する記録があります。\n上書きして追加しますか？`});
        } else {
          doImport(false);
        }
      }catch{
        setImportMsg('⚠ ファイルの形式が正しくありません');
      }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  function mergeImportData(e){
    const file = e.target.files?.[0]; if(!file) return;
    const name = importName.trim() || '共有';
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const d = JSON.parse(ev.target.result);
        if(!d.folders||!d.records) throw new Error('invalid');
        const now = Date.now();

        // 既存の同じ友達のフォルダーを探す
        const existingFolders = folders.filter(f=>f.name.startsWith(name+' / '));
        const existingFolderNames = {};
        existingFolders.forEach(f=>{
          const origName = f.name.slice((name+' / ').length);
          existingFolderNames[origName] = f.id;
        });

        // フォルダーIDのマッピング
        const folderMap = {};
        const addFolders = [];
        d.folders.forEach((f,i)=>{
          if(existingFolderNames[f.name]){
            // 既存フォルダーを再利用
            folderMap[f.id] = existingFolderNames[f.name];
          } else {
            // 新しいフォルダーを追加
            const newId = `import_${now}_${i}`;
            folderMap[f.id] = newId;
            addFolders.push({...f, id:newId, name:`${name} / ${f.name}`});
          }
        });

        // 既存記録の元IDを取得（重複チェック用）
        const existingRecords = records.filter(r=>{
          const fol = folders.find(f=>f.id===r.folderId);
          return fol && fol.name.startsWith(name+' / ');
        });
        // 既存記録の日時+座標でユニークキーを作成
        const existingKeys = new Set(existingRecords.map(r=>`${r.date}_${r.time}_${r.lat}_${r.lng}`));

        // 新しい記録だけ追加（重複スキップ）
        const addRecords = [];
        d.records.forEach((r,i)=>{
          const key = `${r.date}_${r.time}_${r.lat}_${r.lng}`;
          if(!existingKeys.has(key)){
            addRecords.push({...r, id:now+i+1, folderId:folderMap[r.folderId]||null});
          }
        });

        if(addFolders.length>0) setFolders(p=>[...p, ...addFolders]);
        if(addRecords.length>0) setRecords(p=>[...p, ...addRecords]);

        const skipped = d.records.length - addRecords.length;
        const msg = addRecords.length>0
          ? `✓ ${name}の新しい記録を${addRecords.length}件追加しました${skipped>0?' ('+skipped+'件は重複スキップ)':''}`
          : `✓ 新しい記録はありませんでした（${skipped}件はすでにインポート済み）`;
        setImportMsg(msg);
        setImportName('');
      }catch{
        setImportMsg('⚠ ファイルの形式が正しくありません');
      }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  //  /  / GoogleURL 
  function parseCoords(str){
    const s = str.replace(/[（）()]/g,'').trim();

    // GoogleURL 
    // 1: ?q=34.262,135.375
    let m = s.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    // 2: @34.262,135.375
    m = s.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    // 3: /place/... ll=34.262,135.375
    m = s.match(/ll=(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    // 4: maps.google.com/?q=+@34.262,135.375 URL
    try{
      const decoded = decodeURIComponent(s);
      m = decoded.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
      if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
      m = decoded.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/);
      if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    }catch{}

    // :  34.24991,  135.38253
    m = s.match(/北\s*(-?\d+\.?\d*)[°度].*東\s*(-?\d+\.?\d*)[°度]/);
    if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    // N/S/E/W: N34.249, E135.382
    m = s.match(/[Nn]\s*(-?\d+\.?\d*)[°度].*[EeWw]\s*(-?\d+\.?\d*)[°度]/);
    if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};

    // : 3416'16.9, 13518'36.0
    m = s.match(/(\d+)[°度](\d+)[′'分](\d+\.?\d*)[″"秒]?\s*[,\s]\s*(\d+)[°度](\d+)[′'分](\d+\.?\d*)/);
    if(m){
      const lat = parseFloat(m[1]) + parseFloat(m[2])/60 + parseFloat(m[3])/3600;
      const lng = parseFloat(m[4]) + parseFloat(m[5])/60 + parseFloat(m[6])/3600;
      return {lat,lng};
    }

    // 
    m = s.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
    if(m){
      const lat=parseFloat(m[1]), lng=parseFloat(m[2]);
      if(isNaN(lat)||isNaN(lng)) return null;
      if(lat<-90||lat>90||lng<-180||lng>180) return null;
      return {lat,lng};
    }
    return null;
  }

                            setRecords(p=>p.map(rec=>rec.id===r.id?{...rec,place:editingPlace.text.trim()||null}:rec));

                          },style:{background:th.accentBg,border:`1px solid ${th.accentBorder}`,borderRadius:5,
                            color:th.accent,padding:'3px 8px',fontSize:11,cursor:'pointer',fontFamily:'inherit',flexShrink:0}},'保存'),
                        h('button',{onClick:()=>setEditingPlace(null),
                          style:{background:'none',border:`1px solid ${th.cardBorder}`,borderRadius:5,
                            color:th.textSub,padding:'3px 8px',fontSize:11,cursor:'pointer',fontFamily:'inherit',flexShrink:0}},'✕')
                      )
                    : h('div',{style:{display:'flex',alignItems:'center',gap:5,marginBottom:5}},
                        h('span',{style:{fontSize:11,color:th.accent,flexShrink:0}},'📌'),
                        h('span',{style:{fontSize:13,color:r.place?th.accent:th.textFaint,fontWeight:r.place?500:400,flex:1,cursor:'text'},
                          onClick:()=>setEditingPlace({id:r.id,text:r.place||''})},
                          r.place||'場所を追加...'),
                        wt&&h('span',{
                          onClick:()=>setEditWeatherId(r.id),
                          style:{fontSize:12,flexShrink:0,cursor:'pointer',
                            border:'1px solid '+th.cardBorder,borderRadius:4,padding:'1px 4px',background:th.accentBg}},
                          wt.icon+wt.label)
                      ),
                  // memo  tap to edit inline
                  editingMemo?.id===r.id
                    ? h('div',{style:{marginBottom:6}},
                        h('textarea',{
                          autoFocus:true,
                          rows:3,
                          value:editingMemo.text,
                          onChange:e=>setEditingMemo(m=>({...m,text:e.target.value})),
                          onKeyDown:e=>{
                            if(e.key==='Enter'&&!e.shiftKey){
                              e.preventDefault();
                              setRecords(p=>p.map(rec=>rec.id===r.id?{...rec,memo:editingMemo.text.trim()}:rec));
                              setEditingMemo(null);
                            }
                            if(e.key==='Escape') setEditingMemo(null);
                          },
                          style:{width:'100%',background:th.inputBg,border:`1px solid ${th.accent}`,
                            borderRadius:8,color:th.text,fontSize:13,padding:'8px 10px',
                            outline:'none',resize:'none',fontFamily:'inherit'},
                        }),
                        h('div',{style:{display:'flex',gap:8,marginTop:6}},
                          h('button',{
                            onClick:()=>{
                              setRecords(p=>p.map(rec=>rec.id===r.id?{...rec,memo:editingMemo.text.trim()}:rec));
                              setEditingMemo(null);
                            },
                            style:{background:th.accentBg,border:`1px solid ${th.accentBorder}`,borderRadius:6,
                              color:th.accent,padding:'5px 14px',fontSize:12,cursor:'pointer',fontFamily:'inherit'},
                          },'保存'),
                          h('button',{
                            onClick:()=>setEditingMemo(null),
                            style:{background:'none',border:`1px solid ${th.cardBorder}`,borderRadius:6,
                              color:th.textSub,padding:'5px 14px',fontSize:12,cursor:'pointer',fontFamily:'inherit'},
                          },'キャンセル')
                        )
                      )
                    : h('div',{
                        style:{display:'flex',alignItems:'flex-start',gap:6,marginBottom:5,cursor:'text',minHeight:24},
                        onClick:()=>setEditingMemo({id:r.id,text:r.memo||''}),
                        title:'タップしてメモを編集',
                      },
                        h('span',{style:{fontSize:12,color:th.textFaint,flexShrink:0,marginTop:2}},'📝'),
                        h('span',{style:{fontSize:14,color:r.memo?th.text:th.textFaint,flex:1,lineHeight:1.5}},
                          r.memo ? memoBody(r.memo) : 'メモを追加...')
                      ),
                  // coords  tap to edit
                  editingCoords?.id===r.id
                    ? h('div',{style:{marginTop:4,marginBottom:4}},
                        h('div',{style:{fontSize:10,color:th.textMuted,marginBottom:4}},
                          'Googleマップからコピーした座標を貼り付け'),
                        h('input',{autoFocus:true,value:editingCoords.text,
                          onChange:e=>setEditingCoords(c=>({...c,text:e.target.value})),
                          onKeyDown:e=>{
                            if(e.key==='Enter') saveEditCoords(r.id);
                            if(e.key==='Escape') setEditingCoords(null);
                          },
                          placeholder:'34.26274, 135.37541',
                          style:{width:'100%',background:th.inputBg,border:`1px solid ${th.accent}`,
                            borderRadius:6,color:th.text,fontSize:12,padding:'5px 8px',
                            outline:'none',fontFamily:'DM Mono',marginBottom:6}}),
                        h('div',{style:{display:'flex',gap:6}},
                          h('button',{onClick:()=>saveEditCoords(r.id),
                            style:{background:th.accentBg,border:`1px solid ${th.accentBorder}`,borderRadius:5,
                              color:th.accent,padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'保存'),
                          h('button',{onClick:()=>setEditingCoords(null),
                            style:{background:'none',border:`1px solid ${th.cardBorder}`,borderRadius:5,
                              color:th.textSub,padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'キャンセル')
                        )
                      )
                    : h('div',{style:{display:'flex',alignItems:'center',gap:4,marginTop:4,cursor:'text'},
                        onClick:()=>setEditingCoords({id:r.id,text:r.lat.toFixed(5)+', '+r.lng.toFixed(5)})},
                        h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textMuted,flex:1}},
                          r.lat.toFixed(5)+', '+r.lng.toFixed(5)),
                        r.accuracy&&h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textFaint,marginLeft:4}},'±'+r.accuracy+'m')
                      )
                ),
                h('div',{style:{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end',flexShrink:0}},
                  h('button',{onClick:()=>toggleFav(r.id),
                    style:{background:r.fav?'rgba(255,200,0,0.15)':'none',
                      border:`1px solid ${r.fav?'rgba(255,200,0,0.5)':th.cardBorder}`,
                      borderRadius:4,padding:'4px 10px',fontSize:14,cursor:'pointer',lineHeight:1}},
                    r.fav?'⭐':'☆'),
                  h('a',{href:`https://www.google.com/maps?q=${r.lat},${r.lng}`,target:'_blank',
                    style:{display:'inline-flex',alignItems:'center',gap:5,color:th.accent,textDecoration:'none',
                      fontSize:12,border:`1px solid ${th.accentBorder}`,borderRadius:6,padding:'5px 10px',whiteSpace:'nowrap'}},
                    '🗺 地図'),
                  h('button',{onClick:()=>setMoveModal(r.id),
                    style:{background:'none',border:`1px solid ${th.inputBorder}`,color:th.textSub,
                      borderRadius:4,padding:'4px 10px',fontSize:12}},'移動'),
                  h('button',{onClick:()=>setConfirm({type:'record',id:r.id}),
                    style:{background:'none',border:'1px solid rgba(255,80,80,0.3)',color:'rgba(255,120,120,0.7)',
                      borderRadius:4,padding:'4px 10px',fontSize:12}},'削除')
                )
              )
            );
          })
        )
      ),

      //  RECORD 
      view==='record' && h('div',{style:{display:'flex',flexDirection:'column',gap:16}},

        // --  --
        h('div',{style:{
          display:'flex',flexDirection:'column',alignItems:'center',gap:12,
          padding:'28px 20px 24px',borderRadius:16,
          background:th.cardBg,border:`1px solid ${th.accentBorder}`,
          position:'relative',
        }},
          // weather badge
          h('div',{onClick:()=>setShowWeatherPicker(true),
            style:{position:'absolute',top:12,right:12,
              display:'flex',alignItems:'center',gap:5,cursor:'pointer',
              background:isDark(th.bg)?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.7)',
              backdropFilter:'blur(6px)',borderRadius:20,padding:'5px 10px',
              border:`1px solid ${weather?th.accent+'66':th.cardBorder}`,transition:'all .2s'}},
            weather
              ? h(React.Fragment,null,
                  h('span',{style:{fontSize:18}},WEATHERS.find(w=>w.id===weather)?.icon),
                  h('span',{style:{fontSize:11,color:th.accent}},WEATHERS.find(w=>w.id===weather)?.label))
              : h(React.Fragment,null,
                  h('span',{style:{fontSize:15}},'🌤️'),
                  h('span',{style:{fontSize:11,color:th.textMuted}},'天気'))
          ),

          // shutter button  big
          h('button',{onClick:saveRecord,disabled:locating,
            className:locating?'spin':'',
            style:{background:'none',border:`3px solid ${th.accent}`,borderRadius:'50%',
              width:110,height:110,display:'flex',alignItems:'center',justifyContent:'center',
              cursor:'pointer',transition:'transform .1s',flexShrink:0}},
            h('div',{style:{width:84,height:84,borderRadius:'50%',
              background:locating?'transparent':th.accentBg,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}},
              locating?'⏳':'📷')
          ),
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:15,color:th.text,fontWeight:300,marginBottom:3}},
              locating?'位置情報取得中...':`タップして記録`),
            h('div',{style:{fontSize:11,color:th.textMuted}},
              locating?'しばらくお待ちください':'現在地を自動取得')
          ),

          // error / success
          locErr&&h('div',{style:{width:'100%',padding:'8px 12px',borderRadius:8,
            background:'rgba(255,80,80,0.08)',border:'1px solid rgba(255,80,80,0.25)',
            color:'#ff9090',fontSize:12,textAlign:'center'}},'⚠ '+locErr),
          okMsg&&h('div',{style:{width:'100%',padding:'8px 12px',borderRadius:8,
            background:th.accentBg,border:`1px solid ${th.accentBorder}`,
            color:th.accent,fontSize:12,textAlign:'center'}},okMsg)
        ),

        // --  --
        h('div',{style:{borderRadius:12,background:th.cardBg,border:`1px solid ${th.cardBorder}`,
          padding:'16px',display:'flex',flexDirection:'column',gap:14}},

          // folder
          h('div',null,
            h('label',{style:{fontSize:11,color:th.textSub,letterSpacing:2,display:'block',marginBottom:8}},'保存先フォルダー'),
            h('select',{value:tgtFolder||'',onChange:e=>setTgtFolderAndSave(e.target.value||null),
              style:{...inputSt,appearance:'none',cursor:'pointer'}},
              folders.map(f=>h('option',{key:f.id,value:f.id},f.name)),
              folders.length===0&&h('option',{value:''},'フォルダーなし')
            )
          ),

          // memo
          h('div',null,
            h('label',{style:{fontSize:11,color:th.textSub,letterSpacing:2,display:'block',marginBottom:8}},'メモ（任意）'),
            h('textarea',{value:memo,onChange:e=>setMemo(e.target.value),rows:2,
              placeholder:'場所の名前や撮影メモ...',style:{...inputSt,resize:'none'}})
          ),

          // visit count
          h('div',null,
            h('label',{style:{fontSize:11,color:th.textSub,letterSpacing:2,display:'block',marginBottom:8}},'訪問回数'),
            h('div',{style:{display:'flex',alignItems:'center',gap:10}},
              h('button',{onClick:()=>setInputVisitCount(v=>Math.max(1,v-1)),
                style:{background:th.cardBg,border:`1px solid ${th.cardBorder}`,borderRadius:6,
                  color:th.textSub,fontSize:16,width:36,height:36,cursor:'pointer',fontFamily:'inherit'}},'-'),
              h('input',{type:'number',min:1,value:inputVisitCount,
                onChange:e=>setInputVisitCount(Math.max(1,parseInt(e.target.value)||1)),
                style:{...inputSt,width:80,textAlign:'center',fontSize:16,padding:'6px'}}),
              h('button',{onClick:()=>setInputVisitCount(v=>v+1),
                style:{background:th.cardBg,border:`1px solid ${th.cardBorder}`,borderRadius:6,
                  color:th.textSub,fontSize:16,width:36,height:36,cursor:'pointer',fontFamily:'inherit'}},'+'),
              inputVisitCount>1 && h('span',{style:{fontSize:11,color:th.textMuted}},'回目として記録')
            )
          ),

          // manual coords - collapsible
          h('div',null,
            h('div',{onClick:()=>setShowManualInput(v=>!v),
              style:{display:'flex',alignItems:'center',gap:6,cursor:'pointer',userSelect:'none',marginBottom:showManualInput?8:0}},
              h('span',{style:{fontSize:11,color:th.textSub}},'📋 座標・URLで記録（忘れた時・GPS修正）'),
              h('span',{style:{fontSize:10,color:th.textMuted}},showManualInput?'▲':'▼')
            ),
            showManualInput && h('div',null,
              h('div',{style:{fontSize:11,color:th.text,marginBottom:8,lineHeight:1.8,opacity:0.8}},
                'Googleマップ・Appleマップで建物付近を長押し',h('br'),
                '→ 座標をコピー → ここに貼り付けて記録',h('br'),
                h('span',{style:{color:'rgba(255,150,80,0.9)',fontSize:10}},
                  '※ 建物・施設を直接タップしても座標は表示されません')
              ),
              h('input',{value:manualCoords,onChange:e=>setManualCoords(e.target.value),
                placeholder:'座標を貼り付け',
                onKeyDown:e=>e.key==='Enter'&&saveManualRecord(),
                style:{...inputSt,fontFamily:'inherit',fontSize:13,marginBottom:8}}),
              h('div',null,
                h('label',{style:{fontSize:11,color:th.textSub,letterSpacing:1,display:'block',marginBottom:4}},'日時（省略すると現在時刻）'),
                h('input',{type:'datetime-local',value:manualDateTime,
                  onChange:e=>setManualDateTime(e.target.value),
                  style:{...inputSt,fontFamily:'inherit',fontSize:13,marginBottom:8,cursor:'pointer'}})
              ),
              h('button',{onClick:saveManualRecord,disabled:locating||!manualCoords.trim(),
                style:{width:'100%',background:th.accentBg,border:`1px solid ${th.accentBorder}`,
                  borderRadius:8,color:th.accent,padding:'9px',fontSize:13,cursor:'pointer',
                  fontFamily:'inherit',opacity:manualCoords.trim()?1:0.4}},
                '📍 この座標で記録する')
            )
          )
        ),

        // --  --
        records.length>0&&h('div',null,
          h('div',{style:{fontSize:11,color:th.textMuted,letterSpacing:2,marginBottom:10}},'最近の記録'),
          records.slice(0,3).map(r=>{
            const fol=folders.find(f=>f.id===r.folderId);
            const wt=r.weather?WEATHERS.find(w=>w.id===r.weather):null;
            return h('div',{key:r.id,style:{padding:'11px 13px',borderRadius:8,marginBottom:7,
              background:th.cardBg,border:`1px solid ${th.cardBorder}`,
              display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}},
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:r.place||r.memo?3:0}},
                  h('span',{style:{fontFamily:'DM Mono',fontSize:11,color:th.textSub}},r.date+' '+r.time),
                  fol&&h('span',{style:{fontSize:10,color:fol.color}},fol.name)
                ),
                r.place&&h('div',{style:{fontSize:12,color:th.accent,marginBottom:1}},'📌 '+r.place),
                r.memo&&h('div',{style:{fontSize:12,color:th.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.memo)
              ),
              h('a',{href:`https://www.google.com/maps?q=${r.lat},${r.lng}`,target:'_blank',
                style:{color:th.accent,textDecoration:'none',fontSize:12,flexShrink:0,
                  border:`1px solid ${th.accentBorder}`,borderRadius:6,padding:'5px 9px'}},'🗺')
            );
          })
        )
      )
    ),

    // footer
    h('div',{style:{padding:'10px 20px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{style:{fontSize:10,color:th.textFaint,letterSpacing:1}},'位置情報はデバイス内にのみ保存されます'),
      h('div',{style:{fontSize:9,color:th.textFaint,opacity:0.6}},'@haneiro2026')
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>

<!-- Service Worker for offline support -->
<script>
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='photo-loc-v1';
    const ASSETS=[
      'https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
    ];
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{})));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode],{type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
