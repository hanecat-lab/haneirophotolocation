name: Auto Version Stamp
# carestock / caremanagement / management の auto-version.yml と同じ仕組み。
# 対象HTMLが push されたら APP_VERSION を自動更新する。
on:
  push:
    branches: [main]
    paths:
      - 'photo-location.html'
      - 'travel-archive-b.html'

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp version
        run: |
          VER=$(date +%Y%m%d-%H%M%S)
          CHANGED=$(git diff --name-only '${{ github.event.before }}' '${{ github.sha }}' 2>/dev/null || printf 'photo-location.html\ntravel-archive-b.html\n')

          for f in photo-location.html travel-archive-b.html; do
            if echo "$CHANGED" | grep -qx "$f"; then
              sed -i "s/const APP_VERSION=\"[^\"]*\"/const APP_VERSION=\"$VER\"/" "$f"
            fi
          done

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-stamp version [skip ci]"
          git push
