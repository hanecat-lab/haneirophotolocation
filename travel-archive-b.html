<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>旅のアーカイブ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;--bg2:#ede7d9;--bg3:#e2d9c8;
  --ink:#2c2416;--ink2:#6b5c42;--ink3:#9c8a72;
  --accent:#c47c3a;--accent2:#8b5e3c;
  --self:#3a7c7c;--friend:#b05050;--gold:#c9a227;
  --card:#faf6ef;--border:#d4c9b0;--shadow:rgba(44,36,22,.13);
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --nh:52px;--navh:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);font-weight:300;overscroll-behavior:none;}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;height:calc(var(--nh) + var(--st));padding-top:var(--st);background:var(--ink);border-bottom:2px solid var(--accent);display:flex;align-items:center;padding-left:12px;padding-right:12px;z-index:200;gap:8px;}
.logo{font-family:'Playfair Display',serif;font-size:16px;color:#f5f0e8;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:7px;}
.logo-b{background:var(--accent);color:white;font-family:'Noto Sans JP',sans-serif;font-size:9px;font-weight:500;padding:2px 6px;border-radius:3px;}
.hbtn{background:none;border:1px solid #554433;color:#d4c9b0;border-radius:6px;padding:6px 10px;font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap;min-height:36px;display:flex;align-items:center;gap:4px;}
.hbtn.pri{background:var(--accent);border-color:var(--accent);color:white;}

/* SCROLL AREA */
#app{position:fixed;top:calc(var(--nh) + var(--st));bottom:calc(var(--navh) + var(--sb));left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--navh) + var(--sb));padding-bottom:var(--sb);background:var(--ink);border-top:1px solid #3a2e1e;display:flex;align-items:stretch;z-index:200;}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:none;border:none;color:#9c8a72;font-family:'Noto Sans JP',sans-serif;font-size:10px;padding:8px 4px;}
.nbtn.on{color:var(--accent);}
.nbtn .ni{font-size:20px;line-height:1;}

/* HISTORY PANEL */
#hist-panel{display:none;position:fixed;top:calc(var(--nh) + var(--st));left:0;right:0;z-index:150;background:var(--card);border-bottom:2px solid var(--accent);box-shadow:0 4px 20px rgba(44,36,22,.2);max-height:60vh;overflow-y:auto;}
.hp-head{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.hp-title{font-family:'Noto Serif JP',serif;font-size:14px;}
.hp-actions{display:flex;gap:8px;}
.hist-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);}
.hist-info{flex:1;min-width:0;cursor:pointer;}
.hist-name{font-size:13px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hist-meta{font-size:11px;color:var(--ink3);margin-top:3px;}

/* FILTER BAR */
.fbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;align-items:center;}
.fbar::-webkit-scrollbar{display:none;}
.chip{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:12px;color:var(--ink2);white-space:nowrap;font-family:'Noto Sans JP',sans-serif;min-height:36px;}
.chip.on{background:var(--ink);color:var(--bg2);border-color:var(--ink);}
.cdot{width:8px;height:8px;border-radius:50%;}

/* SEARCH */
.sbar{padding:0 14px 10px;background:var(--card);border-bottom:1px solid var(--border);}
.swrap{position:relative;}
.swrap input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--ink);outline:none;-webkit-appearance:none;}
.swrap input:focus{border-color:var(--accent);}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}

/* SORT BAR */
#sort-bar{display:none;background:var(--card);border-bottom:1px solid var(--border);padding:8px 14px;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;align-items:center;}
#sort-bar::-webkit-scrollbar{display:none;}
.sbtn{padding:5px 12px;border-radius:14px;border:1.5px solid var(--border);background:white;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--ink2);cursor:pointer;white-space:nowrap;min-height:30px;}
.sbtn.on{background:var(--ink);color:var(--bg2);border-color:var(--ink);}

/* STATS */
.stats{background:var(--ink);padding:12px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.stn{text-align:center;}
.stnum{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);line-height:1;}
.stlbl{font-size:9px;color:var(--ink3);margin-top:2px;}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:32px 24px;text-align:center;}
.empty-ico{font-size:56px;margin-bottom:18px;opacity:.5;}
.empty-ttl{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink2);margin-bottom:8px;}
.empty-sub{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:28px;}
.drop-zone{width:100%;max-width:360px;border:2px dashed var(--border);border-radius:14px;padding:36px 24px;background:var(--bg2);cursor:pointer;text-align:center;}
.drop-zone-ico{font-size:32px;margin-bottom:10px;}
.drop-zone-ttl{font-family:'Playfair Display',serif;font-size:17px;margin-bottom:5px;}
.drop-zone-sub{font-size:12px;color:var(--ink3);}
.demo-btn{margin-top:16px;background:none;border:1px solid var(--border);border-radius:8px;padding:10px 24px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--ink3);cursor:pointer;}

/* LIST */
.list-wrap{padding:14px;}
.list-group{margin-bottom:24px;}
.lmh{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.lmonth{font-family:'Playfair Display',serif;font-size:18px;}
.lcnt{font-size:11px;color:var(--ink3);}
.lentry{display:flex;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:3px solid transparent;}
.lentry.self-entry{border-left-color:var(--self);}
.lentry.friend-entry{border-left-color:var(--friend);}
.edate{min-width:36px;text-align:center;padding-top:2px;}
.edayn{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);line-height:1;}
.ewday{font-size:9px;color:var(--ink3);}
.ebody{flex:1;min-width:0;}
.ehead{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;}
.eplace{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;flex:1;min-width:0;}
.emeta{font-size:11px;color:var(--ink3);margin-bottom:3px;}
.enote{font-size:12px;color:var(--ink2);line-height:1.6;}
.pbadge{font-size:10px;padding:3px 9px;border-radius:12px;font-weight:500;white-space:nowrap;}
.bs{background:#e0f0f0;color:var(--self);}
.bf{background:#f5e0e0;color:var(--friend);}
.tag{background:var(--bg3);color:var(--ink2);font-size:10px;padding:2px 8px;border-radius:10px;}
.ctags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.visit{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent2);background:#f5ede0;border-radius:10px;padding:2px 9px;margin-top:5px;font-weight:500;}
.mapbtn{background:none;border:none;cursor:pointer;font-size:20px;padding:2px 3px;line-height:1;flex-shrink:0;}
.favbtn{background:none;border:none;cursor:pointer;font-size:20px;padding:2px 3px;line-height:1;flex-shrink:0;}
.echk{display:flex;align-items:center;justify-content:center;padding-top:2px;}
.xchk{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;appearance:none;-webkit-appearance:none;background:white;cursor:pointer;}
.xchk:checked{background:var(--accent);border-color:var(--accent);}

/* CALENDAR */
.cal-wrap{padding:14px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-ttl{font-family:'Playfair Display',serif;font-size:20px;}
.cal-nav{display:flex;gap:8px;}
.cnbtn{width:38px;height:38px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--ink2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cdname{text-align:center;font-size:10px;font-weight:500;color:var(--ink3);padding:4px 0;}
.cday{min-height:60px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px;}
.cday.om{background:var(--bg2);}
.cday.td{border-color:var(--accent);}
.cdnum{font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:2px;}
.cday.td .cdnum{color:var(--accent);font-weight:700;}
.cdots{display:flex;gap:2px;flex-wrap:wrap;}
.cdot2{width:7px;height:7px;border-radius:50%;}
.ds{background:var(--self);}
.df{background:var(--friend);}
.cmore{font-size:8px;color:var(--ink3);}

/* EXPORT BAR */
.xbar{position:fixed;bottom:calc(var(--navh) + var(--sb));left:0;right:0;background:var(--ink);border-top:2px solid var(--accent);padding:10px 16px;display:flex;align-items:center;gap:12px;z-index:190;transform:translateY(100%);transition:transform .25s;}
.xbar.on{transform:translateY(0);}
.xbcnt{font-size:13px;color:var(--bg2);flex:1;}
.xbnum{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);}
.xbbtns{display:flex;gap:8px;}
.xb{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:12px;min-height:36px;}
.xbg{background:transparent;border:1px solid #554433;color:var(--bg3);}
.xbp{background:var(--accent);color:white;}

/* EXPORT MODAL */
#exp-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(44,36,22,.7);align-items:center;justify-content:center;}
.em-inner{background:var(--card);width:88%;max-width:360px;border-radius:16px;padding:0;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.em-head{padding:14px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.em-ttl{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;}
.em-sub{font-size:11px;color:var(--ink3);margin-top:3px;}
.em-body{padding:20px 20px 24px;display:flex;flex-direction:column;gap:12px;}
.em-ta{height:220px;font-family:monospace;font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;resize:none;color:var(--ink2);outline:none;-webkit-overflow-scrolling:touch;overflow-y:auto;}
.em-dl{display:block;text-align:center;padding:14px;background:var(--accent);color:white;border-radius:10px;font-size:15px;font-weight:500;text-decoration:none;}
.em-cp{width:100%;padding:12px;background:var(--bg3);color:var(--ink2);border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;cursor:pointer;}
.em-hint{font-size:11px;color:var(--ink3);text-align:center;line-height:1.7;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--navh) + var(--sb) + 14px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);padding:11px 20px;border-radius:10px;font-size:13px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);z-index:400;opacity:0;transition:all .3s;border-left:3px solid var(--accent);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="logo">旅のアーカイブ <span class="logo-b">App B</span></div>
  <button class="hbtn" onclick="toggleHist()">🕐 履歴</button>
  <button class="hbtn" onclick="document.getElementById('fin').click()">📥 読込</button>
  <button class="hbtn pri" onclick="doExport()">📤 保存</button>
</header>
<input type="file" id="fin" accept=".json" onchange="onFile(event)" style="display:none">

<!-- HISTORY PANEL -->
<div id="hist-panel">
  <div class="hp-head">
    <div class="hp-title">最近読み込んだファイル</div>
    <div class="hp-actions">
      <button class="hbtn" onclick="document.getElementById('fin').click();closeHist()">📥 新しく読込</button>
      <button class="hbtn" onclick="closeHist()">✕</button>
    </div>
  </div>
  <div id="hist-list"></div>
</div>

<div id="app">
  <div id="file-bar" style="display:none;background:#2a2010;border-bottom:1px solid #3a2e1e;padding:7px 16px;align-items:center;gap:8px;position:sticky;top:0;z-index:50;"><span style="font-size:12px;color:var(--ink3)">📄</span><span id="file-bar-name" style="font-size:12px;color:#c8b89a;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span><span id="file-bar-cnt" style="font-size:11px;color:var(--ink3);white-space:nowrap;"></span></div>
  <!-- filter -->
  <div id="top-filters" style="display:none">
    <div class="fbar">
      <div class="chip on" data-p="all" onclick="setPerson('all',this)">👥 すべて <span id="fc-all">0</span></div>
      <div class="chip" data-p="self" onclick="setPerson('self',this)"><span class="cdot" style="background:var(--self)"></span><span id="fn-self">自分</span> <span id="fc-self">0</span></div>
      <div class="chip" id="fav-chip" onclick="toggleFavF(this)">⭐ お気に入り</div>
      <div class="chip" data-p="friend" onclick="setPerson('friend',this)"><span class="cdot" style="background:var(--friend)"></span><span id="fn-friend">友達</span> <span id="fc-friend">0</span></div>
    </div>
    <div class="sbar"><div class="swrap"><span class="sico">🔍</span><input type="text" id="search" placeholder="場所・メモを検索…" oninput="applyF()"></div></div>
    <div id="sort-bar">
      <span style="font-size:11px;color:var(--ink3);white-space:nowrap">並び替え:</span>
      <button class="sbtn on" data-s="date" onclick="setSort('date',this)">📅 日付 ↓</button>
      <button class="sbtn" data-s="visit" onclick="setSort('visit',this)">🔄 来訪回数 ↓</button>
      <button class="sbtn" data-s="near" id="snear" onclick="setSort('near',this)">📍 近い順 ↑</button>
    </div>
    <div class="stats" id="stats-bar" style="display:none">
      <div class="stn"><div class="stnum" id="st-total">0</div><div class="stlbl">記録</div></div>
      <div class="stn"><div class="stnum" id="st-places">0</div><div class="stlbl">場所</div></div>
      <div class="stn"><div class="stnum" id="st-months">0</div><div class="stlbl">月</div></div>
      <div class="stn"><div class="stnum" id="st-sel">0</div><div class="stlbl">選択中</div></div>
    </div>
  </div>
  <div id="view-area"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <button class="nbtn" data-v="calendar" onclick="switchV('calendar',this)"><span class="ni">📅</span>カレンダー</button>
  <button class="nbtn on" data-v="list" onclick="switchV('list',this)"><span class="ni">📋</span>一覧</button>
</nav>

<!-- EXPORT BAR -->
<div class="xbar" id="xbar">
  <div class="xbcnt"><span class="xbnum" id="xb-cnt">0</span>件を選択中</div>
  <div class="xbbtns">
    <button class="xb xbg" onclick="clearSel()">解除</button>
    <button class="xb xbp" onclick="doExport()">📤 保存</button>
  </div>
</div>

<!-- EXPORT MODAL -->
<div id="exp-modal">
  <div class="em-inner">
    <div class="em-head">
      <div><div class="em-ttl">エクスポート</div><div class="em-sub"><span id="em-cnt"></span> のJSONデータ</div></div>
      <button onclick="closeExpModal()" style="background:none;border:none;font-size:22px;color:var(--ink3);cursor:pointer">✕</button>
    </div>
    <div class="em-body">
      <textarea id="em-ta" style="display:none"></textarea>
      <button id="em-dl" class="em-dl" onclick="saveFile()" style="border:none;cursor:pointer;">💾 JSONファイルを保存</button>
      <div class="em-hint">iOS: 共有シートで「ファイルに保存」</div>
    </div>
  </div>
</div>

<!-- MEMO EDIT MODAL -->
<div id="memo-modal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(44,36,22,.7);align-items:center;justify-content:center;">
  <div style="background:var(--card);width:88%;max-width:400px;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.3);overflow:hidden;">
    <div style="padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-family:'Noto Serif JP',serif;font-size:15px;font-weight:600;" id="memo-modal-place"></div>
        <div style="font-size:11px;color:var(--ink3);margin-top:3px;" id="memo-modal-date"></div>
      </div>
      <button onclick="closeMemoModal()" style="background:none;border:none;font-size:22px;color:var(--ink3);cursor:pointer;padding:4px;">✕</button>
    </div>
    <div style="padding:16px 20px 24px;display:flex;flex-direction:column;gap:12px;">
      <textarea id="memo-ta" style="width:100%;height:160px;font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;resize:none;color:var(--ink);outline:none;line-height:1.7;" placeholder="メモを入力…"></textarea>
      <button onclick="saveMemo()" style="width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;">✏️ 保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var G = {
  all: [], filtered: [], sel: new Set(),
  view: 'list', person: 'all', favOnly: false, sort: 'date', sortDir: 'desc',
  myLat: null, myLng: null
};
var DAYS = ['日','月','火','水','木','金','土'];
var MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var WICON = {sunny:'☀️',overcast:'☁️',cloudy:'⛅',rainy:'🌧',snowy:'❄️'};

var DEMO = {
  version:'1.0', app:'TravelGPS-A',
  exported: new Date().toISOString(),
  entries:[
    {id:'e1',person:'self',personName:'自分',place:'浅草寺',date:'2025-11-03',time:'10:23',lat:35.7148,lng:139.7967,note:'朝早く来たら人が少なかった。',tags:['寺社','グルメ'],rating:5},
    {id:'e2',person:'self',personName:'自分',place:'上野公園',date:'2025-11-03',time:'13:45',lat:35.7141,lng:139.7742,note:'紅葉が始まりかけていて綺麗だった。',tags:['公園'],rating:4},
    {id:'e3',person:'friend',personName:'さくら',place:'渋谷スカイ',date:'2025-11-04',time:'17:00',lat:35.6580,lng:139.7016,note:'夕日が最高だった！',tags:['展望台'],rating:5,fav:true},
    {id:'e4',person:'self',personName:'自分',place:'新宿御苑',date:'2025-12-01',time:'11:00',lat:35.6851,lng:139.7100,note:'晩秋の庭園。菊花展をやっていた。',tags:['公園'],rating:4},
    {id:'e5',person:'friend',personName:'さくら',place:'築地場外市場',date:'2025-12-01',time:'08:30',lat:35.6654,lng:139.7707,note:'海鮮丼は絶品。',tags:['グルメ'],rating:5,visitCount:3}
  ]
};

/* ── DOM ready ── */
document.addEventListener('DOMContentLoaded', function() {
  window.addEventListener('dragover', function(e){ e.preventDefault(); });
  window.addEventListener('drop', function(e){
    e.preventDefault();
    var f = e.dataTransfer.files[0];
    if (f) processFile(f);
  });
  showEmpty();
  renderHist();
  document.querySelectorAll('.nbtn').forEach(function(b){
    b.classList.toggle('on', b.dataset.v === G.view);
  });
});

/* ── File import ── */
function onFile(e) {
  var f = e.target.files[0];
  if (f) processFile(f);
}
function processFile(f) {
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var d = JSON.parse(ev.target.result);
      loadData(d, f.name);
      saveHist(f.name, ev.target.result, d);
      var cnt = (d.records || d.entries || []).length;
      showToast('✓ ' + cnt + '件を読み込みました');
    } catch(err) {
      showToast('❌ JSONの読み込みに失敗しました');
    }
  };
  r.readAsText(f);
}

/* ── Load data ── */
function loadData(data, filename) {
  // ファイル名バーを更新
  var fb = document.getElementById('file-bar');
  var fbn = document.getElementById('file-bar-name');
  var fbc = document.getElementById('file-bar-cnt');
  if (fb && filename) {
    fb.style.display = 'flex';
    if (fbn) fbn.textContent = filename;
    if (fbc) fbc.textContent = (data.records || data.entries || []).length + '件';
  }
  var fm = {};
  (data.folders || []).forEach(function(f) { fm[f.id] = f; });
  var raw = data.entries || data.records || [];
  G.all = raw.map(function(e, i) {
    var memo1 = (e.memo || '').split('\n')[0].replace(/---.*$/, '').trim();
    var cm = (e.memo || '').replace(/\n?---\s*天気.*$/, '').trim();
    var ftag = (e.folderId && fm[e.folderId]) ? [fm[e.folderId].name] : [];
    var tags = (e.tags && e.tags.length) ? e.tags : ftag;
    return {
      id: String(e.id || ('e' + i)),
      person: e.person || 'self',
      personName: e.personName || '自分',
      place: e.place || memo1 || '不明',
      date: e.date || '',
      time: e.time || '',
      lat: e.lat || null,
      lng: e.lng || null,
      note: cm || e.note || '',
      weather: e.weather || null,
      tags: tags,
      fav: e.fav || false,
      visitCount: e.visitCount || null,
      rating: e.rating || null,
      dateObj: new Date((e.date || '2000-01-01') + 'T' + (e.time || '12:00'))
    };
  });

  var sn = '自分', fn = '友達';
  G.all.forEach(function(e) {
    if (e.person === 'self' && sn === '自分') sn = e.personName;
    if (e.person === 'friend' && fn === '友達') fn = e.personName;
  });
  setText('fn-self', sn); setText('fn-friend', fn);

  var tf = document.getElementById('top-filters');
  var sb = document.getElementById('sort-bar');
  var stb = document.getElementById('stats-bar');
  if (tf) tf.style.display = 'block';
  if (sb) sb.style.display = 'flex';
  if (stb) stb.style.display = 'grid';
  applyF();
}

/* ── Filters ── */
function applyF() {
  var q = ((document.getElementById('search') || {}).value || '').toLowerCase();
  G.filtered = G.all.filter(function(e) {
    if (G.person !== 'all' && e.person !== G.person) return false;
    if (G.favOnly && !e.fav) return false;
    if (q && e.place.toLowerCase().indexOf(q) < 0 && (e.note || '').toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  updateCounts();
  renderV();
}

function setPerson(val, el) {
  G.person = val;
  document.querySelectorAll('.chip[data-p]').forEach(function(c) { c.classList.remove('on'); });
  if (el) el.classList.add('on');

}

function toggleFavF(el) {

/* ── Sort ── */
function sortLabel(mode, dir) {
  var arrow = dir === 'asc' ? ' ↑' : ' ↓';
  if (mode === 'date') return '📅 日付' + arrow;
  if (mode === 'visit') return '🔄 来訪回数' + arrow;
  if (mode === 'near') return '📍 近い順' + arrow;
  return arrow;
}

function setSort(mode, el) {
  // 同じボタンを押したら昇順/降順トグル
  if (G.sort === mode) {
    G.sortDir = G.sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    // 新しいソートキー: near は昇順(近い順)がデフォルト、他は降順
    G.sortDir = (mode === 'near') ? 'asc' : 'desc';
  }
  G.sort = mode;

  document.querySelectorAll('.sbtn').forEach(function(b) { b.classList.remove('on'); });
  if (el) { el.classList.add('on'); el.textContent = sortLabel(mode, G.sortDir); }

  if (mode === 'near') {
    if (!G.myLat) {
      var btn = document.getElementById('snear');
      if (btn) btn.textContent = '📍 取得中…';
      if (!navigator.geolocation) { showToast('位置情報が使えません'); return; }
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          G.myLat = pos.coords.latitude;
          G.myLng = pos.coords.longitude;
          if (btn) btn.textContent = sortLabel('near', G.sortDir);
          renderV();
          showToast('✓ 現在地を取得しました');
        },
        function() {
          showToast('❌ 位置情報の取得に失敗しました');
          document.querySelectorAll('.sbtn').forEach(function(b) { b.classList.remove('on'); });
          var db = document.querySelector('.sbtn[data-s="date"]');
          if (db) { db.classList.add('on'); db.textContent = sortLabel('date', G.sortDir); }
          G.sort = 'date';
          if (btn) btn.textContent = sortLabel('near', 'asc');
        },
        {enableHighAccuracy: true, timeout: 10000}
      );
      return;
    }
  }
  renderV();
}

/* ── Distance ── */
function dist(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(m) { return m < 1000 ? Math.round(m) + 'm' : (m/1000).toFixed(1) + 'km'; }

/* ── fav toggle ── */
function toggleFav(id, btn) {
  var newFav = false;
  G.all.forEach(function(e) {
    if (e.id === id) { e.fav = !e.fav; newFav = e.fav; }
  });
  G.filtered.forEach(function(e) {
    if (e.id === id) e.fav = newFav;
  });
  // ボタンの絵文字を即更新（再描画なし）
  if (btn) btn.textContent = newFav ? '⭐' : '☆';
  // eplace の先頭マークも更新
  if (btn) {
    var head = btn.parentNode;
    if (head) {
      var eplace = head.querySelector('.eplace');
      if (eplace) {
        var txt = eplace.textContent.replace(/^⭐\s*/, '');
        eplace.textContent = newFav ? ('⭐ ' + txt) : txt;
      }
    }
  }
}

      var r = 0;
      if (G.sort === 'visit') {
        r = (b.visitCount || 0) - (a.visitCount || 0);
      } else if (G.sort === 'near' && G.myLat) {
        r = dist(G.myLat, G.myLng, a.lat||0, a.lng||0) - dist(G.myLat, G.myLng, b.lat||0, b.lng||0);
      } else {
        r = b.dateObj - a.dateObj;
      }
      return G.sortDir === 'asc' ? -r : r;

      var star = e.fav ? '⭐' : '☆';
      var fl = e.fav ? '⭐ ' : '';

      var ds = '';
      if (G.sort === 'near' && G.myLat && e.lat) ds = ' · 📍' + fmtDist(dist(G.myLat, G.myLng, e.lat, e.lng));
      var note = (e.note || '').substring(0, 70) + ((e.note || '').length > 70 ? '…' : '');

      var eid = e.id;

      h += '<div class="lentry ' + e.person + '-entry">';
      h += '<div class="edate"><div class="edayn">' + d.getDate() + '</div><div class="ewday">' + DAYS[d.getDay()] + '</div></div>';
      h += '<div class="ebody">';
      h += '<div class="ehead">';
      h += '<div class="eplace">' + fl + e.place + '</div>';
      if (e.lat) h += '<button class="mapbtn" data-lat="' + elat + '" data-lng="' + elng + '" onclick="openMap(this.dataset.lat,this.dataset.lng)">🗺</button>';
      h += '<button class="favbtn" data-id="' + eid + '" onclick="toggleFav(this.dataset.id,this)">' + star + '</button>';
      h += '</div>';
      h += '<div class="emeta">' + fmtDate(e.date) + ' ' + (e.time || '') + ' ' + wi + ds + '</div>';
      if (note) {
        h += '<div class="enote" style="display:flex;align-items:flex-start;gap:6px;">';
        h += '<span style="flex:1">' + note + '</span>';
        h += '<button style="background:none;border:none;font-size:14px;color:var(--ink3);cursor:pointer;padding:0 2px;flex-shrink:0;" data-id="' + eid + '" onclick="openMemoModal(this.dataset.id)">✏️</button>';
        h += '</div>';
      } else {

      h += '</div>';

  });

function renderCal() {
  var va = document.getElementById('view-area');
  var yr = G.calDate.getFullYear(), mo = G.calDate.getMonth();
  var fd = new Date(yr, mo, 1).getDay();
  var dim = new Date(yr, mo+1, 0).getDate();
  var today = new Date();
  var dm = {};
  G.filtered.forEach(function(e) { if (!dm[e.date]) dm[e.date] = []; dm[e.date].push(e); });
  var cells = '';
  var prev = new Date(yr, mo, 0).getDate();
  for (var i = fd-1; i >= 0; i--) cells += '<div class="cday om"><div class="cdnum" style="opacity:.35">' + (prev-i) + '</div></div>';
  for (var d = 1; d <= dim; d++) {
    var ds = yr + '-' + String(mo+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var es = dm[ds] || [];
    var isTd = today.getFullYear()===yr && today.getMonth()===mo && today.getDate()===d;
    var dots = '';
    es.slice(0,8).forEach(function(e) { dots += '<div class="cdot2 d' + (e.person==='self'?'s':'f') + '"></div>'; });
    var more = es.length > 8 ? '<div class="cmore">+' + (es.length-8) + '</div>' : '';
    cells += '<div class="cday' + (isTd?' td':'') + '"><div class="cdnum">' + d + '</div><div class="cdots">' + dots + '</div>' + more + '</div>';
  }
  var rem = 42 - (fd + dim);
  for (var dd = 1; dd <= rem; dd++) cells += '<div class="cday om"><div class="cdnum" style="opacity:.35">' + dd + '</div></div>';
  var h = '<div class="cal-wrap">';
  h += '<div class="cal-head"><div class="cal-ttl">' + yr + '年 ' + MONTHS[mo] + '</div>';
  h += '<div class="cal-nav"><button class="cnbtn" onclick="chMo(-1)">‹</button><button class="cnbtn" onclick="chMo(1)">›</button></div></div>';
  h += '<div class="cal-grid">' + DAYS.map(function(d) { return '<div class="cdname">' + d + '</div>'; }).join('') + cells + '</div></div>';
  va.innerHTML = h;
}
G.calDate = new Date();
function chMo(d) { G.calDate.setMonth(G.calDate.getMonth() + d); renderCal(); }

/* ── Export ── */
function doExport() {
  var targets = G.sel.size > 0 ? G.all.filter(function(e) { return G.sel.has(e.id); }) : G.filtered;
  if (!targets.length) { showToast('記録がありません'); return; }
  // App A が期待する形式に合わせて出力
  // folderId→folderName のマップを逆引きで再構築
  var folderMap = {};
  targets.forEach(function(e) {
    if (e.tags && e.tags.length && e.folderId) {
      folderMap[e.folderId] = e.tags[0];
    }
  });
  // フォルダ一覧を生成（タグから推測）
  var tagsSeen = {}, foldersList = [{id:'f1',name:'未分類',color:'#888'}];
  targets.forEach(function(e) {
    if (e.tags && e.tags[0] && !tagsSeen[e.tags[0]]) {
      tagsSeen[e.tags[0]] = true;
      if (e.tags[0] !== '未分類') {
        foldersList.push({id:'ftag_'+e.tags[0], name:e.tags[0], color:'#7eb8a4'});
      }
    }
  });
  // recordsをApp A形式に変換
  var appARecords = targets.map(function(e) {
    var folderTag = e.tags && e.tags[0] ? e.tags[0] : '未分類';
    var folderId = folderTag === '未分類' ? 'f1' : 'ftag_' + folderTag;
    // memoを元の形式に戻す
    var memo = e.note || '';
    if (e.weather) {
      var wlabel = {sunny:'☀️ 晴れ',overcast:'☁️ 曇天',cloudy:'⛅ 曇り',rainy:'🌧 雨',snowy:'❄️ 雪'}[e.weather] || '';
      if (memo) memo += '\n--- 天気: ' + wlabel;
      else memo = '--- 天気: ' + wlabel;
    }
    return {
      id: isNaN(Number(e.id)) ? Date.now() + Math.floor(Math.random()*1000) : Number(e.id),
      folderId: folderId,
      date: e.date,
      time: e.time,
      lat: e.lat,
      lng: e.lng,
      accuracy: e.accuracy || null,
      memo: memo,
      weather: e.weather || null,
      place: e.place,
      fav: e.fav || false,
      visitCount: e.visitCount || null
    };
  });
  var payload = {
    folders: foldersList,
    records: appARecords,
    bgColor: '#f0ede6',
    exportedAt: new Date().toISOString()
  };
  var json = JSON.stringify(payload, null, 2);
  var filename = 'travel_' + new Date().toISOString().slice(0,10) + '.json';
  setText('em-cnt', targets.length + '件');
  var ta = document.getElementById('em-ta'); if (ta) ta.value = json;
  // ダウンロードボタンにjsonとfilenameを持たせる
  var dl = document.getElementById('em-dl');
  if (dl) { dl.dataset.json = json; dl.dataset.filename = filename; }
  var modal = document.getElementById('exp-modal'); if (modal) modal.style.display = 'flex';
}

function saveFile() {
  var dl = document.getElementById('em-dl');
  if (!dl) return;
  var json = dl.dataset.json;
  var fn_input = document.getElementById('em-filename');
  var basename = (fn_input && fn_input.value.trim()) ? fn_input.value.trim() : 'travel_' + new Date().toISOString().slice(0,10);
  // .jsonが二重にならないよう処理
  basename = basename.replace(/\.json$/i, '');
  var filename = basename + '.json';
  var blob = new Blob([json], {type: 'application/json'});
  var file = new File([blob], filename, {type: 'application/json'});
  // iOS: Web Share API でファイル共有（AirDrop・ファイルアプリ・メモ等）
  if (navigator.share && navigator.canShare && navigator.canShare({files: [file]})) {
    navigator.share({files: [file], title: '旅のアーカイブ'})
      .then(function() { showToast('✓ 共有しました'); })
      .catch(function(err) { if (err.name !== 'AbortError') fallbackDownload(blob, filename); });
  } else {
    fallbackDownload(blob, filename);
  }
}

function fallbackDownload(blob, filename) {
  // PC・非対応環境: 通常ダウンロード
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  showToast('✓ ダウンロードしました');
}
function closeExpModal() { var m = document.getElementById('exp-modal'); if (m) m.style.display = 'none'; }
function copyJ() {
  var ta = document.getElementById('em-ta'); if (!ta) return;
  ta.select(); ta.setSelectionRange(0, 99999);
  try { navigator.clipboard.writeText(ta.value).then(function() { showToast('✓ コピーしました'); }); }
  catch(err) { try { document.execCommand('copy'); showToast('✓ コピーしました'); } catch(e2) {} }
}

/* ── History ── */
function saveHist(name, jsonStr, data) {
  try {
    var h = getHist();
    h = h.filter(function(x) { return x.name !== name; });
    h.unshift({name:name, count:(data.records||data.entries||[]).length, savedAt:new Date().toISOString(), json:jsonStr});
    h = h.slice(0, 5);
    localStorage.setItem('archiveb_hist', JSON.stringify(h));
    renderHist();
  } catch(e) {}
}
function getHist() {
  try { return JSON.parse(localStorage.getItem('archiveb_hist') || '[]'); } catch(e) { return []; }
}
function renderHist() {
  var el = document.getElementById('hist-list'); if (!el) return;
  var h = getHist();
  if (!h.length) { el.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:var(--ink3)">読み込み履歴はありません</div>'; return; }
  var html = '';
  h.forEach(function(item, i) {
    var d = new Date(item.savedAt);
    var ds = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    html += '<div class="hist-item">'
      + '<div class="hist-info" onclick="loadHist(' + i + ')">'
      + '<div class="hist-name">📄 ' + item.name + '</div>'
      + '<div class="hist-meta">' + item.count + '件 · ' + ds + '</div>'
      + '</div>'
      + '<button onclick="loadHist(' + i + ')" style="background:var(--accent);color:white;border:none;border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;flex-shrink:0">読込</button>'
      + '<button onclick="delHist(' + i + ')" style="background:none;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;cursor:pointer;color:var(--ink3);flex-shrink:0">✕</button>'
      + '</div>';
  });
  el.innerHTML = html;
}
function loadHist(i) {
  var h = getHist(); if (!h[i]) return;
  try {
    var d = JSON.parse(h[i].json);
    loadData(d, h[i].name); closeHist();
    showToast('✓ ' + h[i].name + ' を読み込みました');
  } catch(e) { showToast('❌ 読み込みに失敗しました'); }
}
function delHist(i) {
  var h = getHist(); h.splice(i, 1);
  localStorage.setItem('archiveb_hist', JSON.stringify(h));
  renderHist();
}
function toggleHist() {
  var p = document.getElementById('hist-panel');
  if (!p) return;
  var open = p.style.display === 'block';
  p.style.display = open ? 'none' : 'block';
  if (!open) renderHist();
}
function closeHist() { var p = document.getElementById('hist-panel'); if (p) p.style.display = 'none'; }

/* ── Helpers ── */
function fmtDate(s) {
  if (!s) return '';
  var p = s.split('-');
  return p[0] + '年' + parseInt(p[1]) + '月' + parseInt(p[2]) + '日';
}

var G_editId = null;

function openMemoModal(id) {
  var e = null;
  G.all.forEach(function(x) { if (x.id === id) e = x; });
  if (!e) return;
  G_editId = id;
  var pl = document.getElementById('memo-modal-place');
  var dt = document.getElementById('memo-modal-date');
  var ta = document.getElementById('memo-ta');
  if (pl) pl.textContent = e.place;
  if (dt) dt.textContent = fmtDate(e.date) + ' ' + (e.time || '');
  if (ta) ta.value = e.note || '';
  var modal = document.getElementById('memo-modal');
  if (modal) modal.style.display = 'flex';
  if (ta) setTimeout(function() { ta.focus(); }, 100);
}

function closeMemoModal() {
  var modal = document.getElementById('memo-modal');
  if (modal) modal.style.display = 'none';
  G_editId = null;
}

function saveMemo() {
  if (!G_editId) return;
  var ta = document.getElementById('memo-ta');
  var newNote = ta ? ta.value : '';
  G.all.forEach(function(e) { if (e.id === G_editId) e.note = newNote; });
  G.filtered.forEach(function(e) { if (e.id === G_editId) e.note = newNote; });
  closeMemoModal();
  renderV();
  showToast('✓ メモを保存しました');
}

function showToast(msg) {
  var t = document.getElementById('toast'); if (!t) return;
  t.textContent = msg; t.classList.add('on');
  setTimeout(function() { t.classList.remove('on'); }, 2800);
}
</script>
